                <details style="font-size:11px">
                  <summary style="cursor:pointer;color:var(--ink-3);user-select:none;list-style:none;display:flex;align-items:center;gap:4px">
                    <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" style="transition:transform .15s" class="details-chevron"><path d="M3 2l4 3-4 3"/></svg>
                    Ver diagrama de eventos
                  </summary>
                  <div class="perm-pipeline" style="flex-wrap:wrap;row-gap:10px;margin-top:12px">
                    <div class="perm-pipeline-step">
                      <span class="hook-event-tag" style="font-size:10px">SessionStart</span>
                      <span class="perm-pipeline-desc">on connect</span>
                    </div>
                    <div class="perm-pipeline-arrow">→</div>
                    <div class="perm-pipeline-step">
                      <span class="hook-event-tag" style="font-size:10px">UserPromptSubmit</span>
                      <span class="perm-pipeline-desc">on send</span>
                    </div>
                    <div class="perm-pipeline-arrow">→</div>
                    <div class="perm-pipeline-step">
                      <span class="hook-event-tag" style="font-size:10px;background:var(--yellow,#c80)">PreToolUse</span>
                      <span class="perm-pipeline-desc" style="color:var(--yellow,#c80)">before tool · exit 2 blocks</span>
                    </div>
                    <div class="perm-pipeline-arrow">→</div>
                    <div class="perm-pipeline-step">
                      <span class="hook-event-tag" style="font-size:10px">PostToolUse</span>
                      <span class="perm-pipeline-desc">after tool</span>
                    </div>
                    <div class="perm-pipeline-arrow">→</div>
                    <div class="perm-pipeline-step">
                      <span class="hook-event-tag" style="font-size:10px">Stop</span>
                      <span class="perm-pipeline-desc">on finish</span>
                    </div>
                    <div class="perm-pipeline-note">Hooks reciben el evento como JSON por stdin. Usar matcher para filtrar por tool (Bash, Edit…)</div>
                  </div>
                </details>
              </div>

              <!-- Auto-start toggle -->
              <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--rule-2);border-radius:6px;margin-bottom:16px;background:var(--canvas)">
                <div>
                  <div style="font-size:12px;font-weight:600;color:var(--ink)">Auto-start xeladash</div>
                  <div style="font-size:11px;color:var(--ink-3);margin-top:2px">Start the dashboard automatically when Claude Code opens</div>
                </div>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                  <span style="font-size:11px;color:var(--ink-3)" x-text="isAutoStartEnabled() ? 'On' : 'Off'"></span>
                  <input type="checkbox" :checked="isAutoStartEnabled()" @change="toggleAutoStart($event.target.checked)" style="cursor:pointer;width:16px;height:16px;accent-color:var(--accent,#4a9)">
                </label>
              </div>

              <!-- Hooks section -->
              <div class="config-section" style="margin-bottom:16px">
                <div class="config-section-title" style="display:flex;align-items:center;justify-content:space-between">
                  <span>Hooks<template x-if="configHooks().length>0">&nbsp;(<span x-text="configHooks().length"></span>)</template></span>
                  <button class="btn btn-outline btn-sm" @click="hookBuilder.open=!hookBuilder.open;hookBuilder._tpl='';hookBuilder.scope=configProject?'project':'user'" x-text="hookBuilder.open ? 'Cancel' : '+ Add hook'"></button>
                </div>

                <!-- Hook builder form -->
                <template x-if="hookBuilder.open">
                  <div style="padding:14px 16px;background:var(--canvas-2);border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:12px">

                    <!-- Starter templates -->
                    <div>
                      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px">Instalar en un click</div>
                      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
                        <template x-for="t in hookTemplates()" :key="t.name">
                          <div style="border:1px solid var(--rule-2);border-radius:6px;background:var(--canvas);padding:12px 14px;display:flex;flex-direction:column;gap:8px">
                            <div>
                              <span style="font-size:12px;font-weight:600;color:var(--ink-1);display:block;margin-bottom:4px" x-text="t.name"></span>
                              <span style="font-size:11px;color:var(--ink-3);line-height:1.5;display:block" x-text="t.desc"></span>
                            </div>
                            <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap">
                              <div style="display:flex;gap:5px;flex-wrap:wrap">
                                <span class="hook-event-tag" style="font-size:10px;padding:2px 7px" x-text="t.event"></span>
                                <template x-if="t.matcher"><span style="font-size:10px;padding:2px 7px;border-radius:3px;background:var(--canvas-2);color:var(--ink-3);border:1px solid var(--rule)" x-text="t.matcher"></span></template>
                              </div>
                              <button class="btn btn-primary btn-sm" style="flex-shrink:0"
                                @click="installHookTemplate(t)"
                                :disabled="hookBuilder.saving">
                                Instalar
                              </button>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- Manual config (collapsible) -->
                    <details style="font-size:12px" x-ref="manualDetails">
                      <summary style="cursor:pointer;color:var(--ink-3);user-select:none;list-style:none;display:flex;align-items:center;gap:5px;padding:4px 0">
                        <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" class="details-chevron"><path d="M3 2l4 3-4 3"/></svg>
                        Configurar manualmente
                      </summary>
                      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px">

                    <!-- Event + Matcher -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                      <div>
                        <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:4px">Event</label>
                        <select x-model="hookBuilder.event" @change="hookBuilder._tpl=''" style="width:100%;background:var(--canvas);border:1px solid var(--rule-2);color:var(--ink-1);padding:5px 8px;border-radius:4px;font-size:12px">
                          <option>PreToolUse</option>
                          <option>PostToolUse</option>
                          <option>SessionStart</option>
                          <option>Stop</option>
                          <option>UserPromptSubmit</option>
                          <option>Notification</option>
                          <option>CwdChanged</option>
                          <option>FileChanged</option>
                        </select>
                        <div style="font-size:10.5px;color:var(--ink-3);margin-top:4px;line-height:1.4" x-text="{'PreToolUse':'Before a tool executes. Exit code 2 cancels it.','PostToolUse':'After a tool completes. Receives the response on stdin.','SessionStart':'When a Claude session starts.','Stop':'When Claude finishes responding. Ideal for notifications.','UserPromptSubmit':'When a message is submitted. Can modify the prompt.','Notification':'When Claude wants to show a notification.','CwdChanged':'When the working directory changes.','FileChanged':'When a watched file is modified.'}[hookBuilder.event]"></div>
                      </div>
                      <div>
                        <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:4px">Matcher <span style="font-weight:400;color:var(--ink-4)">(tool name, optional)</span></label>
                        <input type="text" x-model="hookBuilder.matcher" @input="hookBuilder._tpl=''" placeholder="Bash · Edit · Write · Read · *" style="width:100%;background:var(--canvas);border:1px solid var(--rule-2);color:var(--ink-1);padding:5px 8px;border-radius:4px;font-size:12px;box-sizing:border-box">
                        <div style="font-size:10.5px;color:var(--ink-3);margin-top:4px">Empty = any tool. Only applies to Pre/PostToolUse.</div>
                      </div>
                    </div>

                    <!-- Type -->
                    <div>
                      <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:6px">Type</label>
                      <div style="display:flex;gap:18px;flex-wrap:wrap">
                        <template x-for="tp in [{v:'command',d:'Shell command'},{v:'http',d:'HTTP request'},{v:'prompt',d:'Inject prompt'},{v:'agent',d:'Run agent'}]" :key="tp.v">
                          <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
                            <input type="radio" :value="tp.v" x-model="hookBuilder.type" @change="hookBuilder._tpl=''">
                            <span style="font-size:12px;color:var(--ink-2)" x-text="tp.v"></span>
                            <span style="font-size:10px;color:var(--ink-4)" x-text="'— '+tp.d"></span>
                          </label>
                        </template>
                      </div>
                    </div>

                    <!-- Type-specific field -->
                    <div>
                      <template x-if="hookBuilder.type === 'command'">
                        <div>
                          <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:4px">Command</label>
                          <textarea x-model="hookBuilder.command" @input="hookBuilder._tpl=''" rows="2" placeholder="osascript -e '...'   /   echo hello >> ~/log.txt" style="width:100%;background:var(--canvas);border:1px solid var(--rule-2);color:var(--ink-1);padding:5px 8px;border-radius:4px;font-size:11.5px;font-family:'SF Mono','Fira Code',monospace;box-sizing:border-box;resize:vertical"></textarea>
                          <div style="font-size:10.5px;color:var(--ink-3);margin-top:4px">El evento se recibe como JSON por <code>stdin</code>. <details style="display:inline"><summary style="display:inline;cursor:pointer;color:var(--ink-4)">Ver ejemplo</summary><code style="display:block;margin-top:4px">python3 -c "import json,sys; d=json.load(sys.stdin)"</code></details></div>
                        </div>
                      </template>
                      <template x-if="hookBuilder.type === 'http'">
                        <div>
                          <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:4px">URL</label>
                          <input type="text" x-model="hookBuilder.url" @input="hookBuilder._tpl=''" placeholder="https://..." style="width:100%;background:var(--canvas);border:1px solid var(--rule-2);color:var(--ink-1);padding:5px 8px;border-radius:4px;font-size:12px;box-sizing:border-box">
                          <div style="font-size:10.5px;color:var(--ink-3);margin-top:4px">POST con el evento JSON en el body. Claude espera respuesta 200 para continuar.</div>
                        </div>
                      </template>
                      <template x-if="hookBuilder.type === 'prompt' || hookBuilder.type === 'agent'">
                        <div>
                          <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:4px">Prompt</label>
                          <textarea x-model="hookBuilder.prompt" @input="hookBuilder._tpl=''" rows="3" placeholder="Instruction for Claude when the event fires…" style="width:100%;background:var(--canvas);border:1px solid var(--rule-2);color:var(--ink-1);padding:5px 8px;border-radius:4px;font-size:12px;box-sizing:border-box;resize:vertical"></textarea>
                        </div>
                      </template>
                    </div>

                    <!-- Scope selector (solo si hay proyecto seleccionado) -->
                    <template x-if="configProject">
                      <div>
                        <label style="font-size:11px;color:var(--ink-3);display:block;margin-bottom:6px">Save to</label>
                        <div style="display:flex;gap:16px;flex-wrap:wrap">
                          <template x-for="sc in [{v:'user',d:(status?.claudeDir||'~/.claude')+'/settings.json'},{v:'project',d:'.claude/settings.json'},{v:'local',d:'.claude/settings.local.json'}]" :key="sc.v">
                            <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
                              <input type="radio" :value="sc.v" x-model="hookBuilder.scope">
                              <span style="font-size:12px;color:var(--ink-2)" x-text="sc.v"></span>
                              <span style="font-size:10px;color:var(--ink-4)" x-text="'— '+sc.d"></span>
                            </label>
                          </template>
                        </div>
                      </div>
                    </template>

                    <!-- Actions -->
                    <div style="display:flex;align-items:center;gap:8px">
                      <button class="btn btn-primary btn-sm" @click="addHook()" :disabled="hookBuilder.saving">
                        <span x-text="hookBuilder.saving ? 'Saving…' : 'Añadir hook'"></span>
                      </button>
                      <span class="err-msg" x-show="hookBuilder.msg" x-text="hookBuilder.msg"></span>
                    </div>
                      </div><!-- /manual config inner -->
                    </details><!-- /manual config details -->
                  </div>
                </template>

                <!-- Active hooks list -->
                <template x-if="configHooks().length === 0 && !hookBuilder.open">
                  <div style="padding:10px 16px;color:var(--ink-3);font-size:12px">No hooks configured</div>
                </template>
                <template x-for="(h,i) in configHooks()" :key="i">
                  <div style="padding:12px 16px;border-bottom:1px solid var(--canvas);display:flex;flex-direction:column;gap:8px">
                    <!-- Header row -->
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
                      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:0">
                        <!-- Toggle -->
                        <label style="cursor:pointer;display:flex;align-items:center" title="Disable hook">
                          <input type="checkbox" checked @click.prevent="toggleHook(h)" style="cursor:pointer;accent-color:var(--accent,#4a9)">
                        </label>
                        <span class="hook-event-tag" x-text="h.event"></span>
                        <template x-if="h.matcher"><span style="font-size:11px;color:var(--ink-2)" x-text="'matcher: '+h.matcher"></span></template>
                        <span style="font-size:10px;padding:1px 6px;border-radius:3px;background:var(--canvas-2);color:var(--ink-3);border:1px solid var(--rule)" x-text="h.type"></span>
                        <!-- Scope badge -->
                        <span style="font-size:10px;padding:1px 7px;border-radius:3px;font-weight:600"
                          :style="{
                            background: (h._scope||'user')==='user' ? '#dbeafe' : (h._scope)==='project' ? '#dcfce7' : '#fed7aa',
                            color:      (h._scope||'user')==='user' ? '#1d4ed8' : (h._scope)==='project' ? '#15803d' : '#c2410c',
                            border: '1px solid ' + ((h._scope||'user')==='user' ? '#93c5fd' : (h._scope)==='project' ? '#86efac' : '#fdba74')
                          }"
                          x-text="h._scope || 'user'"></span>
                      </div>
                      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
                        <template x-if="!(hookEdit.active && hookEdit.event===h.event && hookEdit.matcherIndex===h.matcherIndex)">
                          <button class="btn btn-outline btn-sm" @click="startHookEdit(h)">Edit</button>
                        </template>
                        <template x-if="h.type==='command'||h.type==='http'">
                          <button class="btn btn-outline btn-sm"
                            @click="hookTest.active&&hookTest.event===h.event&&hookTest.matcherIndex===h.matcherIndex ? hookTest.active=false : runHookTest(h)"
                            :disabled="hookTest.running&&hookTest.event===h.event&&hookTest.matcherIndex===h.matcherIndex"
                            x-text="hookTest.active&&hookTest.event===h.event&&hookTest.matcherIndex===h.matcherIndex ? 'Close' : (hookTest.running&&hookTest.event===h.event&&hookTest.matcherIndex===h.matcherIndex ? 'Running…' : 'Run')">
                          </button>
                        </template>
                        <!-- Move to scope -->
                        <template x-if="configProject">
                          <select style="font-size:11px;padding:2px 6px;border:1px solid var(--rule-2);border-radius:3px;background:var(--canvas);color:var(--ink-2);cursor:pointer"
                            @change="moveHook(h, $event.target.value); $event.target.value=''">
                            <option value="">Move to…</option>
                            <option value="user"    :disabled="(h._scope||'user')==='user'">User settings</option>
                            <option value="project" :disabled="(h._scope||'user')==='project'">Project settings</option>
                            <option value="local"   :disabled="(h._scope||'user')==='local'">Local settings</option>
                          </select>
                        </template>
                        <button @click="deleteHook(h)" style="background:none;border:none;cursor:pointer;color:var(--ink-3);padding:2px 8px;font-size:16px;line-height:1;border-radius:3px" title="Delete hook" @mouseover="$el.style.color='var(--red,#e05)'" @mouseout="$el.style.color='var(--ink-3)'">×</button>
                      </div>
                    </div>
                    <!-- Command: read or edit mode -->
                    <template x-if="!(hookEdit.active && hookEdit.event===h.event && hookEdit.matcherIndex===h.matcherIndex)">
                      <div>
                        <!-- Hook from template: humanized view, command collapsed -->
                        <template x-if="findTemplate(h)">
                          <div>
                            <div style="margin-bottom:4px">
                              <span style="font-size:12px;font-weight:600;color:var(--ink-1)" x-text="findTemplate(h).name"></span>
                              <span style="font-size:11px;color:var(--ink-3);margin-left:8px" x-text="findTemplate(h).desc"></span>
                            </div>
                            <details style="font-size:11px">
                              <summary style="cursor:pointer;color:var(--ink-4);user-select:none;list-style:none;display:flex;align-items:center;gap:4px">
                                <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" class="details-chevron"><path d="M3 2l4 3-4 3"/></svg>
                                Ver comando
                              </summary>
                              <div class="hook-command" style="margin-top:6px" x-text="h.command || h.url || h.prompt"></div>
                            </details>
                          </div>
                        </template>
                        <!-- Custom hook: show command directly -->
                        <template x-if="!findTemplate(h)">
                          <div class="hook-command" x-text="h.command || h.url || h.prompt"></div>
                        </template>
                      </div>
                    </template>
                    <!-- Test result panel -->
                    <template x-if="hookTest.active && hookTest.event===h.event && hookTest.matcherIndex===h.matcherIndex">
                      <div style="border:1px solid var(--rule-2);border-radius:5px;overflow:hidden;font-size:11.5px;font-family:'SF Mono','Fira Code',monospace">
                        <div style="padding:6px 10px;background:var(--canvas-2);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--rule)">
                          <span style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)">Test run</span>
                          <template x-if="hookTest.running"><span style="font-size:10px;color:var(--ink-3)">running…</span></template>
                          <template x-if="!hookTest.running && hookTest.result">
                            <span style="font-size:11px;font-weight:600;padding:1px 8px;border-radius:10px"
                              :style="hookTest.result.exitCode===0 ? 'background:rgba(0, 255, 136, 0.1);color:#00ff88' : hookTest.result.exitCode===2 ? 'background:rgba(255, 208, 0, 0.1);color:#ffd000' : 'background:rgba(255, 51, 102, 0.1);color:#ff3366'"
                              x-text="'exit ' + hookTest.result.exitCode + (hookTest.result.exitCode===2?' — blocked':'')"></span>
                            <span style="font-size:10px;color:var(--ink-4)" x-text="hookTest.result.duration + 'ms'"></span>
                          </template>
                        </div>
                        <template x-if="!hookTest.running && hookTest.result">
                          <div style="padding:8px 10px;display:flex;flex-direction:column;gap:6px;background:var(--canvas)">
                            <template x-if="hookTest.result.stdout">
                              <div>
                                <div style="font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);margin-bottom:3px">stdout</div>
                                <pre style="margin:0;white-space:pre-wrap;word-break:break-all;color:var(--ink-2)" x-text="hookTest.result.stdout"></pre>
                              </div>
                            </template>
                            <template x-if="hookTest.result.stderr">
                              <div>
                                <div style="font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--red,#c8102e);margin-bottom:3px">stderr</div>
                                <pre style="margin:0;white-space:pre-wrap;word-break:break-all;color:var(--red,#c8102e)" x-text="hookTest.result.stderr"></pre>
                              </div>
                            </template>
                            <template x-if="!hookTest.result.stdout && !hookTest.result.stderr">
                              <span style="color:var(--ink-4);font-size:11px">(no output)</span>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="hookEdit.active && hookEdit.event===h.event && hookEdit.matcherIndex===h.matcherIndex">
                      <div style="display:flex;flex-direction:column;gap:6px">
                        <textarea x-model="hookEdit.draft" rows="3" style="width:100%;background:var(--canvas);border:1px solid var(--accent,#4a9);color:var(--ink-1);padding:6px 10px;border-radius:4px;font-size:11.5px;font-family:'SF Mono','Fira Code',monospace;box-sizing:border-box;resize:vertical"></textarea>
                        <div style="display:flex;align-items:center;gap:6px">
                          <button class="btn btn-primary btn-sm" @click="saveHookEdit()" :disabled="hookEdit.saving">
                            <span x-text="hookEdit.saving ? 'Saving…' : 'Save'"></span>
                          </button>
                          <button class="btn btn-outline btn-sm" @click="hookEdit.active=false">Cancel</button>
                          <span class="err-msg" x-show="hookEdit.msg" x-text="hookEdit.msg"></span>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- Disabled hooks -->
                <template x-if="configDisabledHooks().length > 0">
                  <div>
                    <div style="padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4)">Disabled</div>
                    <template x-for="(h,i) in configDisabledHooks()" :key="i">
                      <div style="padding:10px 16px;border-bottom:1px solid var(--canvas);display:flex;align-items:center;gap:8px;opacity:.5">
                        <label style="cursor:pointer;display:flex;align-items:center" title="Enable hook">
                          <input type="checkbox" @click.prevent="enableHook(h.hiddenIndex)" style="cursor:pointer;accent-color:var(--accent,#4a9)">
                        </label>
                        <span class="hook-event-tag" x-text="h.event"></span>
                        <template x-if="h.matcher"><span style="font-size:11px;color:var(--ink-2)" x-text="'matcher: '+h.matcher"></span></template>
                        <span style="font-size:11px;color:var(--ink-3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono','Fira Code',monospace" x-text="h.command || h.url || h.prompt"></span>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Diagnóstico (execution log + hook files) — colapsado por defecto -->
              <details class="config-section" style="margin-bottom:16px">
                <summary style="cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px;padding:10px 16px" @click="if(!hooksLog) loadHooksLog()">
                  <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" class="details-chevron"><path d="M3 2l4 3-4 3"/></svg>
                  <span style="font-size:12px;font-weight:600;color:var(--ink-2)">Diagnóstico</span>
                  <span style="font-size:11px;color:var(--ink-4)">— historial de ejecución y archivos de hook</span>
                </summary>

                <!-- Execution log -->
                <div style="padding:0 0 8px 0">
                  <div style="padding:8px 16px 6px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3)">Execution log</div>
                  <template x-if="hooksLogLoading">
                    <div style="padding:14px 16px;color:var(--ink-3);font-size:12px;display:flex;align-items:center;gap:8px"><div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Escaneando sesiones…</div>
                  </template>
                  <template x-if="!hooksLogLoading && hooksLog && hooksLog.length === 0">

        try {
          const highlighted = hljs.highlight(token.text, { language: valid }).value;
          return `<pre><code class="hljs language-${valid}">${highlighted}</code></pre>`;
        } catch { return `<pre><code>${token.text}</code></pre>`; }
      },
      codespan(token) {
        try {
          const highlighted = hljs.highlightAuto(token.text).value;
          return `<code class="inline-code hljs">${highlighted}</code>`;
        } catch { return `<code class="inline-code">${token.text}</code>`; }

        async init() {
          const savedView    = sessionStorage.getItem('cs:view');
          const savedProject = localStorage.getItem('cs:project');
          const savedBranch  = localStorage.getItem('cs:branch');
          const savedText    = localStorage.getItem('cs:filterText');
          const savedFrom    = localStorage.getItem('cs:filterFrom');
          const savedTo      = localStorage.getItem('cs:filterTo');
          const startView = savedView || this.defaultView;
          const hiddenViews = [
            !this.showInsights && 'dashboard',
          ].filter(Boolean);
          if (startView && !hiddenViews.includes(startView)) this.view = startView;
          else if (hiddenViews.includes(startView)) this.view = 'sessions';
          if (savedText) this.filterText = savedText;
          if (savedFrom) this.filterFrom = savedFrom;
          if (savedTo)   this.filterTo   = savedTo;

          this.$watch('view', v => {
            sessionStorage.setItem('cs:view', v);
            if (v !== 'sessions' && window.location.hash.startsWith('#/session/')) window.location.hash = '';
          });
          this.$watch('filterProject', v => localStorage.setItem('cs:project',    v));
          this.$watch('filterBranch',  v => localStorage.setItem('cs:branch',     v));
          this.$watch('filterText',    v => localStorage.setItem('cs:filterText', v));
          this.$watch('filterFrom',    v => localStorage.setItem('cs:filterFrom', v));
          this.$watch('filterTo',      v => localStorage.setItem('cs:filterTo',   v));
          this.$watch('configProject',  () => { this.config = null; this.loadConfig(); this.hooksLog = null; this.toolCommands = []; this.toolSkills = []; this.agents = []; if (this.view === 'commands' || this.view === 'skills') this.loadTools(); if (this.view === 'agents') this.loadAgents(); });

          await this.loadProjects();
          if (savedProject) this.filterProject = savedProject;
          await this.loadBranches();
          if (savedBranch) this.filterBranch = savedBranch;
          await this.loadSessions();
          this.initView(this.view);
          this.loadCosts();
          this.loadStatus();
          this.loadInsights();
          this.loadUsageWindows();
          // Load counts for nav badges without blocking
          this.loadPlans();
          this.loadAgents();
          this.loadTools();
          this.loadMemory();
          this.startActivePolling();
          // Parse URL hash for direct links
          const hash = window.location.hash;
          const mSession = hash.match(/^#\/session\/([^/]+)\/([^/]+)$/);
          if (mSession) { this.view = 'sessions'; await this.openSessionById(mSession[2], mSession[1]); }
          // Clear hash when closing
          this.$watch('selectedSession', v => {
            if (!v) {
              if (window.location.hash.startsWith('#/session/')) window.location.hash = '';
              this.closeLiveStream();
            }
          });
        },

        initView(v) {
          if (v === 'dashboard')            { this.loadStats(); this.loadInsights(); this.loadUsageWindows(); }
          if (v === 'projects')             { this.loadProjects(); }
          if (v === 'memory')               { this.loadMemory(); }
          if (v === 'plans')                { this.loadPlans(); }
          if (v === 'commands' || v === 'skills') { this.loadTools(); }
          if (v === 'skills')   { if (this.skillsTab === 'marketplace') this.loadMarketplace(); }
          if (v === 'commands') { if (this.cliTab === 'marketplace') { this.loadCommandsMarketplace(); this.loadCommandsMarketplaceSources(); } }
          if (v === 'agents')   { this.loadAgents(); if (this.agentsTab === 'marketplace') { this.loadAgentsMarketplace(); this.loadAgentsMarketplaceSources(); } }
          if (v === 'plugins')  { this.loadPlugins(); if (this.pluginsTab === 'discover') { this.loadPluginsAvailable(); this.loadPluginsMarketplaces(); } }
          if (v === 'config' || v === 'instructions' || v === 'permissions' || v === 'hooks') { this.loadConfig(); }
        },

        // ── Live session monitor ────────────────────────────────────────────────

        startActivePolling() {
          this.pollActiveSessions();
          this._livePollingTimer = setInterval(() => this.pollActiveSessions(), 5000);
        },

        async pollActiveSessions() {
          try {
            const data = await fetch('/api/sessions/active').then(r => r.json());
            this.activeSessions = data;
            if (this.liveSource) {
              // Close stream if the session it's tracking is no longer active
              const still = data.find(s => s.sessionId === this.liveSessionId);
              if (!still) this.closeLiveStream();
            } else if (data.length > 0) {
              // Prefer the currently selected session if it's active;
              // otherwise open a background stream for the first active session (for sound notifications)
              const selected = this.selectedSession && data.find(s => s.sessionId === this.selectedSession.sessionId);
              const target = selected ? this.selectedSession : (this.liveNotifyEnabled ? data[0] : null);
              if (target) this.openLiveStream(target);
            }
          } catch {}
        },

        openLiveStream(session) {
          this.closeLiveStream();
          const url = `/api/sessions/${session.projectDir}/${session.sessionId}/stream`;
          const es = new EventSource(url);
          this.liveSource    = es;
          this.liveSessionId = session.sessionId;
          this.liveBurnRate  = 0;
          this.liveTools     = [];
          this._liveBurnStart    = null;
          this._liveBurnNewToks  = 0;
          // Seed context % from already-loaded sessionDetail (last message's context)
          this._liveLastCtxTotal = this._ctxFromSessionDetail();

          // Refresh sessionDetail every 4s while live (keeps tokens/cost in header accurate)
          this._liveRefreshTimer = setInterval(async () => {
            if (!this.selectedSession || this.selectedSession.sessionId !== session.sessionId) return;
            try {
              const d = await fetch(`/api/sessions/${session.projectDir}/${session.sessionId}`).then(r => r.json());
              this.sessionDetail = d;
              this._liveLastCtxTotal = this._ctxFromSessionDetail();
            } catch {}
            // Also refresh commits if that tab is open
            if (this.sessionDetailTab === 'commits') this.loadSessionCommits();
          }, 4000);

          es.onmessage = (e) => {
            let msg;
            try { msg = JSON.parse(e.data); } catch { return; }
            if (msg.type === 'assistant' && msg.message?.usage) {
              const u = msg.message.usage;
              // Context gauge: use THIS message's total input (not accumulated sum)
              // input_tokens + cache_read + cache_creation = full context sent to model
              this._liveLastCtxTotal =
                (u.input_tokens || 0) +
                (u.cache_read_input_tokens || 0) +
                (u.cache_creation_input_tokens || 0);

              // Burn rate: accumulate only NEW tokens (SSE skips history)
              const newToks = (u.input_tokens || 0) + (u.output_tokens || 0);
              this._liveBurnNewToks += newToks;
              const now = Date.now();
              if (!this._liveBurnStart) {
                this._liveBurnStart = now;
              } else {
                const elapsed = (now - this._liveBurnStart) / 60000;
                if (elapsed > 0.05) this.liveBurnRate = Math.round(this._liveBurnNewToks / elapsed);
              }

              // Tool feed
              if (Array.isArray(msg.message?.content)) {
                for (const block of msg.message.content) {
                  if (block.type === 'tool_use') {
                    this.liveTools = [block.name, ...this.liveTools].slice(0, 5);
                  }
                }
              }

              // Idle timer: si no llega nada en 4s → Claude esperando input
              this._resetIdleTimer();
            }
          };
          es.onerror = () => {};
        },

        closeLiveStream() {
          if (this.liveSource) { try { this.liveSource.close(); } catch {} this.liveSource = null; }
          if (this._liveRefreshTimer) { clearInterval(this._liveRefreshTimer); this._liveRefreshTimer = null; }
          clearTimeout(this._liveIdleTimer);
          this._liveIdleTimer    = null;
          this.liveSessionId     = null;
          this.liveBurnRate      = 0;
          this.liveTools         = [];
          this._liveLastCtxTotal = 0;
          this._liveBurnNewToks  = 0;
        },

        isActiveSession(sessionId) {
          return this.activeSessions.some(s => s.sessionId === sessionId);
        },

        // Context %: from the last assistant message's total input context
        // (not a running sum — each message's input = full conversation context sent to model)
        liveContextPct() {
          if (!this._liveLastCtxTotal) return 0;
          return Math.min(100, Math.round(this._liveLastCtxTotal / 200000 * 100));
        },

        // Seed initial context from already-loaded sessionDetail
        _ctxFromSessionDetail() {
          if (!this.sessionDetail?.tokens) return 0;
          // The last turn's context ≈ total input - sum of prior outputs
          // Best proxy without re-parsing: use the most recent input tokens directly
          // from the raw last assistant message if available
          const msgs = this.sessionDetail.messages || [];
          for (let i = msgs.length - 1; i >= 0; i--) {
            const m = msgs[i];
            if (m.type === 'assistant' && m.message?.usage) {
              const u = m.message.usage;
              return (u.input_tokens || 0) + (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
            }
          }
          return 0;
        },

        // ── Done notification ───────────────────────────────────────────────────

        toggleLiveNotify() {
          this.liveNotifyEnabled = !this.liveNotifyEnabled;
          localStorage.setItem('cs:liveNotify', this.liveNotifyEnabled);
          if (this.liveNotifyEnabled) {
            this._unlockAudio();
            if ('Notification' in window && Notification.permission === 'default') {
              Notification.requestPermission();
            }
          }
        },

        _unlockAudio() {
          if (!this._liveAudioCtx) {
            try { this._liveAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
          }
        },

        _playDone() {
          try {
            const ctx = this._liveAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
            this._liveAudioCtx = ctx;
            // Two-tone soft ding: 880 Hz → 660 Hz
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.25, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.55);
          } catch {}
        },

        _notifyClaudeDone() {
          if (!this.liveNotifyEnabled) return;
          this._playDone();
          // Browser notification only if tab is not focused
          if ('Notification' in window && Notification.permission === 'granted' && !document.hasFocus()) {
            const s = this.activeSessions[0];
            new Notification('Claude is waiting ↩', {
              body: s?.firstPrompt ? s.firstPrompt.slice(0, 80) : (s?.projectDir || 'Session ready'),
            });
          }
        },

        _testOsNotification() {
          if (!('Notification' in window)) { this.osNotifPermission = 'unsupported'; return; }
          if (Notification.permission !== 'granted') {
            Notification.requestPermission().then(p => {
              this.osNotifPermission = p;
              if (p === 'granted') this._testOsNotification();
            });
            return;
          }
          this.osNotifPermission = 'granted';
          // Force notification regardless of focus — for testing purposes
          new Notification('Claude is waiting ↩', { body: 'Test — si ves esto, OS notifications funcionan ✓' });
        },

        _resetIdleTimer() {
          clearTimeout(this._liveIdleTimer);
          // 4 s sin mensajes nuevos → Claude terminó y espera input
          this._liveIdleTimer = setTimeout(() => this._notifyClaudeDone(), 4000);
        },

        // ── Session Archaeology ────────────────────────────────────────────────

        get filesChangedDiffs() {
          const diffs = this.sessionDiffs[this.selectedSession?.sessionId];
          if (!diffs?.length) return [];
          const fileMap = new Map();
          const order = [];
          for (const d of diffs) {
            if (!fileMap.has(d.filePath)) {
              order.push(d.filePath);
            }
            // Siempre sobreescribir con el último cambio del fichero
            fileMap.set(d.filePath, {
              filePath: d.filePath,
              tool: d.tool,
              totalAdded: d.added,
              totalRemoved: d.removed,
              changes: [d],
            });
          }
          return order.map(k => fileMap.get(k));
        },

        get fileTreeFlat() {
          const files = this.filesChangedDiffs;
          if (!files.length) return [];
          const q = this.ftFilter.trim().toLowerCase();

          if (q) {
            // Filtered mode: matching files + their immediate parent folder only
            const result = [];
            const seenFolders = new Set();
            files.forEach((f, fi) => {
              const parts = f.filePath.replace(/^\//, '').split('/');
              const filename = parts[parts.length - 1];
              if (!filename.toLowerCase().includes(q)) return;
              if (parts.length > 1) {
                const folderKey = parts.slice(0, -1).join('/');
                if (!seenFolders.has(folderKey)) {
                  seenFolders.add(folderKey);
                  result.push({ type: 'folder', name: parts[parts.length - 2], path: folderKey, depth: 0 });
                }
              }
              result.push({ type: 'file', name: filename, fi, filePath: f.filePath, depth: parts.length > 1 ? 1 : 0 });
            });
            return result;
          }

          // Full tree mode
          const root = {};
          const addFile = (node, parts, fi, filePath) => {
            if (parts.length === 1) {
              (node._files = node._files || []).push({ name: parts[0], fi, filePath });
            } else {
              const dir = parts[0];
              node[dir] = node[dir] || {};
              addFile(node[dir], parts.slice(1), fi, filePath);
            }
          };
          files.forEach((f, fi) => addFile(root, f.filePath.replace(/^\//, '').split('/'), fi, f.filePath));
          const result = [];
          const collapsed = this.collapsedFolders;
          const walk = (node, depth, prefix) => {
            const dirs = Object.keys(node).filter(k => k !== '_files').sort();
            for (const name of dirs) {
              const path = prefix ? prefix + '/' + name : name;
              result.push({ type: 'folder', name, path, depth });
              if (!collapsed[path]) walk(node[name], depth + 1, path);
            }
            for (const f of (node._files || [])) {
              result.push({ type: 'file', name: f.name, fi: f.fi, filePath: f.filePath, depth });
            }
          };
          walk(root, 0, '');
          return result;
        },

        toggleFolder(path) {
          this.collapsedFolders = { ...this.collapsedFolders, [path]: !this.collapsedFolders[path] };
        },

        scrollToFile(fi) {
          const el = document.querySelector(`[data-fc-fi="${fi}"]`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        },

        get splitDiffs() {
          const diffs = this.sessionDiffs[this.selectedSession?.sessionId];
          if (!diffs?.length) return [];
          const groups = [];
          const seen = new Map();
          for (const d of diffs) {
            const ts = d.timestamp || '';
            if (!seen.has(ts)) { seen.set(ts, []); groups.push({ timestamp: ts, changes: seen.get(ts) }); }
            seen.get(ts).push(d);
          }
          return groups;
        },

        async loadSessionBookmarks() {
          const s = this.selectedSession;
          if (!s) return;
          try {
            const data = await fetch(`/api/sessions/${s.projectDir}/${s.sessionId}/bookmarks`).then(r => r.json());
            this.sessionBookmarks = { ...this.sessionBookmarks, [s.sessionId]: data };

        isBookmarked(uuid) {

        async toggleBookmark(msg) {
          const s = this.selectedSession;
          if (!s || !msg?.uuid) return;
          const bms = this.sessionBookmarks[s.sessionId] || [];

            this.sessionBookmarks = { ...this.sessionBookmarks, [s.sessionId]: bms.filter(b => b.id !== existing.id) };

        },

        _bmIdx: 0,
        prevBookmark() {

        async loadSessionCommits() {

          // For active sessions bypass cache so we always see the latest commits

          this.sessionCommitsLoading = true;
          try {

            this.sessionCommits = { ...this.sessionCommits, [s.sessionId]: data };
          } catch {}
          this.sessionCommitsLoading = false;
        },

        _langFromExt(filePath) {
          const ext = (filePath || '').split('.').pop().toLowerCase();
          return { js:'javascript',mjs:'javascript',cjs:'javascript',jsx:'javascript',
            ts:'typescript',tsx:'typescript',
            html:'html',htm:'html',svelte:'html',vue:'html',
            css:'css',scss:'css',less:'css',
            json:'json',jsonc:'json',
            rs:'rust', py:'python', rb:'ruby', go:'go', java:'java',
            sh:'bash',bash:'bash',zsh:'bash',
            md:'markdown',mdx:'markdown',
            yaml:'yaml',yml:'yaml',toml:'toml',sql:'sql',
            xml:'xml',svg:'xml',
            kt:'kotlin',kts:'kotlin',swift:'swift',
            c:'c',h:'c',cpp:'cpp',cc:'cpp',cxx:'cpp',hpp:'cpp',
            cs:'csharp',php:'php',r:'r',
          }[ext] || null;
        },

        _escHtml(s) {
          return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        },

        _splitHlHtml(html) {
          // Split hljs output by newlines while properly closing/reopening <span> tags
          const lines = []; let cur = ''; let open = []; let i = 0;
          while (i < html.length) {
            if (html[i] === '<') {
              const end = html.indexOf('>', i);
              if (end === -1) { cur += html.slice(i); break; }
              const tag = html.slice(i, end + 1);
              if (tag.startsWith('<span')) { open.push(tag); cur += tag; }
              else if (tag === '</span>') { open.pop(); cur += tag; }
              else cur += tag;
              i = end + 1;
            } else if (html[i] === '\n') {
              cur += '</span>'.repeat(open.length);
              lines.push(cur); cur = open.join(''); i++;
            } else { cur += html[i++]; }
          }
          if (cur) lines.push(cur);
          return lines;
        },

        _hlGroup(lines, lang) {
          if (!window.hljs || !lines.length) return;
          const text = lines.map(l => l.line).join('\n');
          let htmlLines;
          try {
            let r;
            if (lang === 'html' && !text.includes('<')) {
              // Hunk inside <script> or <style> — auto-detect the sub-language
              r = hljs.highlightAuto(text, ['javascript', 'typescript', 'css', 'scss']);
            } else if (lang) {
              r = hljs.highlight(text, { language: lang, ignoreIllegals: true });
            } else {
              r = { value: this._escHtml(text) };
            }
            htmlLines = this._splitHlHtml(r.value);
          } catch { htmlLines = lines.map(l => this._escHtml(l.line)); }
          lines.forEach((l, i) => { l._html = htmlLines[i] ?? this._escHtml(l.line); });
        },

        splitRows(hunk) {
          const rows = []; let i = 0;
          while (i < hunk.length) {
            if (hunk[i].type === 'context') { rows.push({ lt:'ctx', rt:'ctx', l:hunk[i], r:hunk[i] }); i++; }
            else {
              const rem = [], add = [];
              while (i < hunk.length && hunk[i].type === 'remove') rem.push(hunk[i++]);
              while (i < hunk.length && hunk[i].type === 'add') add.push(hunk[i++]);
              for (let j = 0; j < Math.max(rem.length, add.length); j++)
                rows.push({ lt: rem[j] ? 'remove' : 'empty', rt: add[j] ? 'add' : 'empty', l: rem[j]||null, r: add[j]||null });
            }
          }
          return rows;
        },

        _highlightDiffs(diffs) {
          for (const d of diffs) {
            const lang = this._langFromExt(d.filePath);
            for (const hunk of (d.hunks || [])) this._hlGroup(hunk, lang);
            if (d.allLines) this._hlGroup(d.allLines, lang);
          }
        },

        async loadSessionDiffs() {
          const s = this.selectedSession;
          if (!s || this.sessionDiffs[s.sessionId]) return;
          this.sessionDiffsLoading = true;
          try {
            const data = await fetch(`/api/sessions/${s.projectDir}/${s.sessionId}/diffs`).then(r => r.json());
            // Tag each change with a stable index and restore viewed state from localStorage
            const sid = s.sessionId;
            for (let i = 0; i < data.length; i++) {
              data[i]._idx = i;
              if (localStorage.getItem(`viewed:${sid}:${i}`) === '1') {
                data[i]._viewed = true;
                data[i]._open = false;
              }
            }
            this._highlightDiffs(data);
            this.sessionDiffs = { ...this.sessionDiffs, [s.sessionId]: data };
          } catch {}
          this.sessionDiffsLoading = false;
          // Init scroll sync after diffs are available
          this.$nextTick(() => this.initScrollSync());
        },

        toggleTimeline() {
          this.timelineMode = !this.timelineMode;
          localStorage.setItem('cs:timelineMode', this.timelineMode ? '1' : '0');
          if (this.timelineMode) {
            this.$nextTick(() => this.initScrollSync());
          } else {
            if (this._scrollListener) { this._scrollListener.el.removeEventListener('scroll', this._scrollListener.fn); this._scrollListener = null; }
          }
        },

        initScrollSync() {
          // Clean up previous listeners
          if (this._scrollListener) {
            this._scrollListener.el.removeEventListener('scroll', this._scrollListener.fn);
            this._scrollListener = null;
          }
          const chatEl = document.getElementById('chat-col');
          const panel = document.getElementById('split-diffs-panel');
          if (!chatEl) return;
          const self = this;
          let lockTimer = null;
          const lock = () => {
            self._syncLock = true;
            clearTimeout(lockTimer);
            lockTimer = setTimeout(() => { self._syncLock = false; }, 500);
          };

          let _lastChatTs = null;

          // Left → Right: chat scroll drives diffs panel
          const onChatScroll = () => {
            if (self._syncLock) return;
            const messages = Array.from(chatEl.querySelectorAll('[data-ts]'));
            if (!messages.length) return;
            const chatRect = chatEl.getBoundingClientRect();
            const markerY = chatRect.top + chatRect.height * self.tlMarker;
            let topMsg = null;
            for (const el of messages) {
              if (el.getBoundingClientRect().bottom > markerY) { topMsg = el; break; }
            }
            if (!topMsg) return;
            const ts = topMsg.dataset.ts;
            if (!ts) return;
            const groups = self.splitDiffs;
            if (!groups.length) return;
            let target = groups[0];
            for (const g of groups) { if (g.timestamp <= ts) target = g; }
            if (_lastChatTs === target.timestamp) return;
            _lastChatTs = target.timestamp;
            self.activeDiffTs = target.timestamp;
            if (!panel) return;
            for (const el of panel.querySelectorAll('[data-diff-ts]')) {
              if (el.dataset.diffTs === target.timestamp) {
                lock();
                const pRect = panel.getBoundingClientRect();
                const gRect = el.getBoundingClientRect();
                panel.scrollBy({ top: gRect.top - (pRect.top + pRect.height * self.tlMarker), behavior: 'smooth' });
                break;
              }
            }
          };

          chatEl.addEventListener('scroll', onChatScroll, { passive: true });
          this._scrollListener = { el: chatEl, fn: onChatScroll };
          onChatScroll();
        },

        async loadSessionDetailFiles() {
          const s = this.selectedSession;
          if (!s || this.sessionSummaries[s.sessionId]) return;
          try {
            const data = await fetch(`/api/sessions/${s.projectDir}/${s.sessionId}/summary`).then(r => r.json());
            this.sessionSummaries = { ...this.sessionSummaries, [s.sessionId]: data };
          } catch {}
        },

        goToFileSearch(filePath) {

          this.view = 'sessions';
          this.sessionsTab = 'files';
          this.filesQuery = filePath;
          this.$nextTick(() => {

        filesAutocomplete() {
          const q = this.filesQuery.trim();
          this.filesSuggestIdx = -1;
          if (!q || this.recentFiles.length === 0) { this.filesSuggestions = []; return; }
          let re;
          try { re = new RegExp(q, 'i'); } catch { re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'); }
          this.filesSuggestions = this.recentFiles.filter(f => re.test(f.filePath)).slice(0, 10);
          // Also trigger search after debounce
          clearTimeout(this._filesSearchTimer);
          this._filesSearchTimer = setTimeout(() => this.searchFiles(), 400);
        },

        selectFilesSuggestion(sug) {
          this.filesQuery = sug.filePath;
          this.filesSuggestions = [];

        async searchFiles() {

            this.filesResults = await fetch(`/api/files/touched?q=${encodeURIComponent(q)}`).then(r => r.json());

        },

        filesGrouped() {
          // Group results by file path
          const groups = {};
          for (const r of this.filesResults) {
            if (!groups[r.filePath]) groups[r.filePath] = [];

        timelineBranches() {
          const seen = new Set();
          const branches = [];
          for (const s of this.sessions) {
            const b = s.gitBranch || '';
            if (!seen.has(b)) { seen.add(b); branches.push(b); }
          }
          return branches.slice(0, 12);

        fmtDuration(secs) {
          if (secs < 60) return secs + 's';
          if (secs < 3600) return Math.round(secs / 60) + 'm';

        startResize(e) {
          const startX = e.clientX;
          const startW = this.sidebarW;
          const handle = e.currentTarget;
          handle.classList.add('is-dragging');
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          const onMove = (e) => {
            this.sidebarW = Math.max(160, Math.min(520, startW + (e.clientX - startX)));
          };
          const onUp = () => {
            handle.classList.remove('is-dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            localStorage.setItem('cm:sidebarW', this.sidebarW);
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        },

        toggleNav() {
          const el = document.querySelector('.sidebar');
          el.classList.add('nav-animating');
          if (this.navWidth <= 56) {
            this.navWidth = parseInt(localStorage.getItem('cs:navWidthFull') || '224');
          } else {
            localStorage.setItem('cs:navWidthFull', this.navWidth);
            this.navWidth = 44;
          }
          localStorage.setItem('cs:navWidth', this.navWidth);
          setTimeout(() => el.classList.remove('nav-animating'), 220);
        },
        startNavResize(e) {
          const startX = e.clientX;
          const startW = this.navWidth;
          this._navDragging = true;
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          const ICON_W = 44, SNAP_IN = 80, MIN_FULL = 160, MAX_W = 400;
          const onMove = (ev) => {
            const w = startW + (ev.clientX - startX);
            if (w < SNAP_IN) {
              this.navWidth = ICON_W;
            } else {
              this.navWidth = Math.max(MIN_FULL, Math.min(MAX_W, w));
            }
          };
          const onUp = () => {
            this._navDragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            if (this.navWidth > ICON_W) localStorage.setItem('cs:navWidthFull', this.navWidth);
            localStorage.setItem('cs:navWidth', this.navWidth);
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        },

        async toggleSubagent(block, projectDir, sessionId) {
          if (block._subagentOpen) { block._subagentOpen = false; return; }

          block._subagentLoading = true;

          let agentList = this.subagentCache[cacheKey];
          if (!agentList) {
            agentList = await fetch(`/api/sessions/${projectDir}/${sessionId}/subagents`).then(r => r.json());
            this.subagentCache[cacheKey] = agentList;
          }

          if (match) {

        groupedByDate() {
          const groups = {};
          const now = new Date();
          const today     = now.toISOString().slice(0, 10);
          const yesterday = new Date(now - 86400000).toISOString().slice(0, 10);
          const weekAgo   = new Date(now - 7 * 86400000).toISOString().slice(0, 10);
          const monthAgo  = new Date(now - 30 * 86400000).toISOString().slice(0, 10);
          for (const s of this.sessions) {
            if (!s.modified) { if (!groups['Older']) groups['Older'] = []; groups['Older'].push(s); continue; }
            const d = s.modified.slice(0, 10);
            let label;
            if (d === today) label = 'Today';
            else if (d === yesterday) label = 'Yesterday';
            else if (d >= weekAgo) label = 'This week';
            else if (d >= monthAgo) label = 'This month';
            else label = 'Older';
            if (!groups[label]) groups[label] = [];
            groups[label].push(s);
          }
          const order = ['Today', 'Yesterday', 'This week', 'This month', 'Older'];
          const ordered = {};
          for (const k of order) if (groups[k]) ordered[k] = groups[k];
          return ordered;
        },

        branchColor(branch) {
          if (!branch) return '#C8C2BA';
          let h = 0;
          for (let i = 0; i < branch.length; i++) h = (h * 31 + branch.charCodeAt(i)) >>> 0;
          return `hsl(${h % 360}, 45%, 42%)`;
        },

        getUserBlocks(msg) {
          const content = msg.message?.content;
          const blocks = typeof content === 'string' ? [{ type: 'text', text: content }] : Array.isArray(content) ? content : [];
          return blocks.map(b => {
            if (b.type !== 'text') return b;
            const m = b.text?.match(/<command-name>([^<]+)<\/command-name>/);
            if (m) return { type: 'slash-command', command: m[1].startsWith('/') ? m[1] : '/' + m[1] };
            return b;
          });
        },

        getAssistantBlocks(msg) {
          const content = msg.message?.content;
          if (Array.isArray(content)) return content;
          return [];
        },

        msgHasText(msg) {
          if (msg.type === 'user') {
            return this.getUserBlocks(msg).some(b => b.type === 'text' && b.text?.trim());
          }
          if (msg.type === 'assistant') {
            return this.getAssistantBlocks(msg).some(b => b.type === 'text' && b.text?.trim());
          }
          return true;
        },

        getSubagentText(msg) {
          const content = msg.message?.content;
          if (typeof content === 'string') return content;
          if (Array.isArray(content)) return content.map(c => c.text || c.thinking || '').join(' ');
          return '';
        },

        getToolSummary(block) {
          const input = block.input || {};
          if (block.name === 'Bash')  return (input.command || '').slice(0, 60);
          if (block.name === 'Read')  return input.file_path?.split('/').slice(-2).join('/') || '';
          if (block.name === 'Write') return input.file_path?.split('/').slice(-2).join('/') || '';
          if (block.name === 'Edit')  return input.file_path?.split('/').slice(-2).join('/') || '';
          if (block.name === 'Glob')  return input.pattern || '';
          if (block.name === 'Grep')  return input.pattern || '';
          if (block.name === 'Agent') return (input.description || '').slice(0, 50);
          return '';
        },

        renderMd(text) { try { return marked.parse(text); } catch { return text; } },


        renderInlineCode(text) {
          const esc = text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
          return esc.replace(/`([^`\n]+)`/g, (_, code) => {
            const decoded = code.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"');
            return `<code class="inline-code hljs">${hljsInline(decoded)}</code>`;
          });
        },

        shortProjectName(p) {
          if (!p) return 'unknown';
          const parts = p.replace(/\\/g, '/').split('/');
          return parts[parts.length - 1] || parts[parts.length - 2] || p;
        },

        shortModelName(m) {
          if (!m) return '';
          if (m.includes('opus')) return 'Opus';
          if (m.includes('sonnet')) return 'Sonnet';
          if (m.includes('haiku')) return 'Haiku';
          return m.split('-').slice(1, 3).join('-');
        },

        formatDate(iso) {
          if (!iso) return '';
          const d = new Date(iso);
          const diff = new Date() - d;
          if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          if (diff < 604800000) { const days = Math.floor(diff/86400000); return days === 1 ? 'Yesterday' : `${days}d ago`; }
          return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        },

        formatTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); },

        fmtNum(n) {
          if (!n) return '0';
          if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
          if (n >= 1000) return (n/1000).toFixed(1)+'K';
          return String(n);
        },

        highlightMatch(m) {
          const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          return esc(m.snippet.slice(0, m.matchStart))
            + `<span class="search-match">${esc(m.snippet.slice(m.matchStart, m.matchStart + m.matchLen))}</span>`
            + esc(m.snippet.slice(m.matchStart + m.matchLen));
        },

        highlightText(text, query) {
          if (!query || query.length < 2) return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
          return esc(text).replace(re, m => `<span class="search-match">${m}</span>`);
        },

        topBranch() {
          if (!this.stats?.sessionsByBranch) return '—';
          const e = Object.entries(this.stats.sessionsByBranch);
          if (!e.length) return '—';
          return e.sort((a,b) => b[1]-a[1])[0][0].split('/').pop();
        },

        topBranches() {
          if (!this.stats?.sessionsByBranch) return [];
          return Object.entries(this.stats.sessionsByBranch).sort((a,b) => b[1]-a[1]).slice(0,10);
        },

        topBranchCount() { const b = this.topBranches(); return b.length ? b[0][1] : 1; },

        budgetStatus() {

          const monthCost = Object.entries(this.insights.byDate)
            .filter(([d]) => d.startsWith(monthPrefix))
            .reduce((sum, [, v]) => sum + v, 0);
          const pct = monthCost / this.budgetMonthly;
          return { monthCost, pct, status: pct >= 1 ? 'over' : pct >= 0.8 ? 'warn' : 'ok' };

          const m = Math.floor((diff % 3600000) / 60000);
          return 'Resets in ' + (h > 0 ? h + 'h ' + m + 'min' : m + 'min');

        weeklyResetLabel() {
          if (!this.usageWindows?.currentWeek) return '';

        copyTemplate(t) {

            const el = document.createElement('textarea');

        windowBars() {
          if (!this.usageWindows?.windows) return [];
          const wins = this.usageWindows.windows;
          const maxCost = Math.max(...wins.map(w => w.cost), 0.01);
          return wins.map(w => ({
            start: w.start,
            pct: Math.max((w.cost / maxCost) * 100, w.cost > 0 ? 2 : 0),
            cost: w.cost,
            sessions: w.sessions,
            isCurrent: w.current || false,
            label: new Date(w.start).toLocaleDateString('en', { weekday: 'short', hour: '2-digit', hour12: false }) + '-' + new Date(w.end).toLocaleTimeString('en', { hour: '2-digit', hour12: false })
          }));
        },

        weekBars() {
          if (!this.usageWindows?.weeks) return [];
          const weeks = this.usageWindows.weeks;
          const maxCost = Math.max(...weeks.map(w => w.cost), 0.01);
          return weeks.map((w, i) => ({
            weekStart: w.start,
            pct: Math.max((w.cost / maxCost) * 100, w.cost > 0 ? 3 : 0),
            cost: w.cost,
            sessions: w.sessions,
            avgDaily: w.avgDaily || 0,
            isCurrent: i === weeks.length - 1,
            weekLabel: new Date(w.start).toLocaleDateString('en', { month: 'short', day: 'numeric' })
          }));
        },

        timeUntilWindowReset() {
          if (!this.usageWindows?.currentWindow) return '';
          const end = new Date(this.usageWindows.currentWindow.end);
          const now = new Date();
          const diff = end - now;
          if (diff <= 0) return 'now';
          const h = Math.floor(diff / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          return h > 0 ? `${h}h ${m}m` : `${m}m`;
        },

        ruleBuilderPreview() {
          const { tool, specifier, pathType } = this.ruleBuilder;
          const spec = specifier.trim();
          if (!spec) return tool;
          if (tool === 'WebFetch') {
            const d = spec.startsWith('domain:') ? spec : 'domain:' + spec;
            return `WebFetch(${d})`;
          }
          if (tool === 'Read' || tool === 'Edit' || tool === 'Write') {
            return `${tool}(${pathType}${spec})`;
          }
          if (tool === 'MCP') {
            const parts = spec.split('/');
            return parts.length >= 2 ? `mcp__${parts[0].trim()}__${parts[1].trim()}` : `mcp__${spec.trim()}`;
          }
          if (tool === 'Agent') return `Agent(${spec})`;
          return `Bash(${spec})`;
        },

        ruleBuilderAdd() {
          const rule = this.ruleBuilderPreview();
          if (!rule) return;
          const type = this.ruleBuilder.type;
          if (!this.permsDraft[type].includes(rule)) {
            this.permsDraft[type].push(rule);
          }
          this.ruleBuilder.specifier = '';
        },

        permissionPresets() {
          return [
            {
              name: 'Restrictivo',
              desc: 'Bloquea shell y escritura. Pide confirmación para todo lo demás.',
              deny: ['Bash(*)', 'Write(*)'],
              ask:  ['Read(*)', 'Edit(*)'],
              allow: [],
            },
            {
              name: 'Estándar',
              desc: 'Permite comandos comunes. Bloquea acciones peligrosas.',
              deny: ['Bash(rm -rf *)', 'Bash(git push --force*)'],
              ask:  [],
              allow: ['Bash(npm *)', 'Bash(git *)', 'Bash(ls *)', 'Bash(cat *)'],
            },
            {
              name: 'Permisivo',
              desc: 'Permite todo sin preguntar. Ideal para proyectos personales.',
              deny: [],
              ask:  [],
              allow: ['Bash(*)', 'Read(*)', 'Edit(*)', 'Write(*)'],
            },
          ];
        },

        applyPermissionPreset(preset) {
          const addUniq = (arr, rules) => { for (const r of rules) if (!arr.includes(r)) arr.push(r); };
          addUniq(this.permsDraft.deny,  preset.deny);
          addUniq(this.permsDraft.ask,   preset.ask);
          addUniq(this.permsDraft.allow, preset.allow);
        },

        ruleToolName(rule) {
          if (rule.startsWith('mcp__')) return 'MCP';
          const m = rule.match(/^([A-Za-z]+)/);
          return m ? m[1] : '?';
        },

        humanizeRule(rule) {
          if (!rule) return '';
          if (rule.startsWith('mcp__')) {
            const parts = rule.split('__');
            if (parts.length === 2) return `Server "${parts[1]}" — all tools`;
            if (parts.length >= 3) return `Server "${parts[1]}" → "${parts[2]}"`;
            return rule;
          }
          const m = rule.match(/^([A-Za-z]+)(?:\((.*)\))?$/);
          if (!m) return rule;
          const [, tool, spec] = m;
          if (!spec) {
            return { Bash:'Any Bash command', Read:'Any file read', Edit:'Any file edit', Write:'Any file write', WebFetch:'Any web request', Agent:'Any subagent' }[tool] || tool;
          }
          if (tool === 'Bash') {
            if (spec === '*') return 'Any Bash command';
            if (spec.endsWith(' *')) return `Commands starting with "${spec.slice(0,-2)}"`;
            if (spec.startsWith('* ')) return `Commands ending with "${spec.slice(2)}"`;
            if (spec.includes('*')) return `Commands matching "${spec}"`;
            return `Exact: "${spec}"`;
          }
          if (tool === 'Read' || tool === 'Edit' || tool === 'Write') return `${tool}: ${spec}`;
          if (tool === 'WebFetch') return `Requests to ${spec.replace('domain:','')}`;
          if (tool === 'Agent') return `Subagent: ${spec}`;
          return rule;
        },

        fmtCost(n) {
          if (!n || n < 0.0001) return '$0.00';
          if (n < 0.01) return '$' + n.toFixed(4);
          if (n < 1) return '$' + n.toFixed(3);
          if (n < 100) return '$' + n.toFixed(2);
          return '$' + Math.round(n);
        },

        carbonEquivs(g) {
          if (!g || g < 1) return null;
          const kg = g / 1000;
          const car   = Math.round(kg / 0.143);          // 143 gCO₂/km EU avg
          const flights = kg / 180;                       // ~180 kg/pax short EU flight
          const trees = Math.round(kg / 21);              // ~21 kg absorbed/tree/year
          const burgers = Math.round(kg / 2.3);           // ~2.3 kg CO₂ per beef burger
          const electricity = kg / 200;                   // ~200 kg CO₂/month EU home
          const fmt = n => n >= 1000 ? (n/1000).toFixed(1).replace('.',',') + 'k' : String(Math.round(n));
          return {
            car:   fmt(car) + ' km by car',
            flights: flights < 1.5 ? '1 short-haul flight' : flights.toFixed(1) + ' short-haul flights',
            trees: trees + ' tree' + (trees !== 1 ? 's' : '') + ' for a year',
            burgers: fmt(burgers) + ' beef burgers',
            electricity: electricity < 1.5 ? '1 month of home electricity' : electricity.toFixed(1) + ' months of home electricity',
          };
        },

        fmtCarbon(g) {
          if (!g || g < 0.001) return null;
          if (g < 1) return (g * 1000).toFixed(0) + 'mg CO₂';
          if (g < 1000) return g.toFixed(1) + 'g CO₂';
          return (g / 1000).toFixed(2) + 'kg CO₂';
        },

        fmtTokensM(n) {
          if (!n) return '0';
          return (n / 1_000_000).toFixed(2) + 'M';
        },

        insightsDailyBars() {
          const byDate = this.insights?.byDate || {};
          const bars = [];
          const today = new Date();
          for (let i = 29; i >= 0; i--) {
            const d = new Date(today); d.setDate(today.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            bars.push({ date: key, cost: byDate[key] || 0 });
          }
          const max = Math.max(...bars.map(b => b.cost), 0.0001);
          return bars.map(b => ({ ...b, pct: (b.cost / max * 100).toFixed(1) }));
        },
