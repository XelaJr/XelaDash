                  <template x-for="(group, filePath) in filesGrouped()" :key="filePath">
                    <div style="margin-bottom:20px">
                      <!-- File header -->
                      <div style="display:flex;align-items:center;gap:8px;padding:10px 0 6px;border-bottom:1px solid var(--rule);margin-bottom:4px">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6"/><polyline points="9 2 9 6 13 6"/></svg>
                        <code style="font-size:12px;font-weight:600;color:var(--ink)" x-text="filePath"></code>
                        <span style="font-size:11px;color:var(--ink-3)" x-text="group.length + ' session' + (group.length===1?'':'s')"></span>
                      </div>
                      <!-- Sessions that touched this file -->
                      <template x-for="r in group" :key="r.sessionId + r.filePath">
                        <div class="session-row" style="padding:8px 10px" @click="openSessionById(r.sessionId, r.projectDir)">
                          <div class="session-body">
                            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                              <!-- Operation badge -->
                              <span style="font-size:10px;font-weight:700;letter-spacing:0.05em;padding:1px 5px;border-radius:3px"
                                :style="r.tool==='Write' ? 'background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)' : r.tool==='Edit' ? 'background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)' : 'background:var(--bg-2);color:var(--ink-2)'"
                                x-text="r.tool"></span>
                              <span style="font-size:12px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="r.firstPrompt || '(no prompt)'"></span>
                            </div>
                            <div class="session-lower">
                              <span class="session-msgs" x-text="shortProjectName(r.projectPath) || r.projectDir"></span>
                              <span class="session-msgs" x-text="formatDate(r.modified)"></span>
                            </div>
                          </div>
                          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--ink-3)" stroke-width="1.5" style="flex-shrink:0"><line x1="3" y1="7" x2="11" y2="7"/><polyline points="7 3 11 7 7 11"/></svg>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- TAB: Timeline -->
          <template x-if="sessionsTab === 'timeline'">
            <div style="flex:1;overflow-y:auto;min-height:0;padding:16px 24px 24px">
              <template x-if="loadingSessions"><div class="loading"><div class="spinner"></div> Loading…</div></template>
              <template x-if="!loadingSessions && sessions.length === 0">
                <div class="empty"><div>No sessions found</div></div>
              </template>
              <template x-if="!loadingSessions && sessions.length > 0">
                <div>
                  <!-- Branch legend -->
                  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)">
                    <template x-for="branch in timelineBranches()" :key="branch">
                      <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-2);padding:2px 8px;border-radius:12px;border:1px solid var(--rule)">
                        <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0" :style="'background:' + branchColor(branch)"></span>
                        <span x-text="branch || 'no branch'"></span>
                      </span>
                    </template>
                  </div>
                  <!-- Days -->
                  <template x-for="(group, label) in groupedByDate()" :key="label">
                    <div class="tl-day">
                      <!-- Date label -->
                      <div class="tl-day-label">
                        <span x-text="label === 'Today' || label === 'Yesterday' ? label : label.split(' ')[0]"></span>
                        <span x-text="label === 'Today' || label === 'Yesterday' ? '' : label.split(' ').slice(1).join(' ')"></span>
                      </div>
                      <!-- Spine -->
                      <div class="tl-spine"></div>
                      <!-- Sessions -->
                      <div class="tl-sessions">
                        <template x-for="s in group" :key="s.sessionId">
                          <div class="tl-card" @click="openSession(s)">
                            <div class="tl-branch-bar" :style="'background:' + branchColor(s.gitBranch)"></div>
                            <div class="tl-card-body">
                              <div class="tl-card-top">
                                <span class="tl-card-prompt" x-text="s.firstPrompt || '(no prompt)'"></span>
                                <template x-if="sessionCosts[s.sessionId]">
                                  <span style="font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:var(--ink-2);flex-shrink:0" x-text="fmtCost(sessionCosts[s.sessionId])"></span>
                                </template>
                              </div>
                              <div class="tl-card-meta">
                                <span class="tl-meta-chip">
                                  <span style="width:7px;height:7px;border-radius:50%;flex-shrink:0" :style="'background:' + branchColor(s.gitBranch)"></span>
                                  <span x-text="s.gitBranch || 'no branch'"></span>
                                </span>
                                <span class="tl-meta-chip" x-text="shortProjectName(s.projectPath) || s.projectDir.replace(/^-/,'').split('-').pop()"></span>
                                <span class="tl-meta-chip" x-text="s.messageCount + ' msgs'"></span>
                                <span class="tl-meta-chip" x-text="formatDate(s.modified, true)"></span>
                              </div>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- TAB: History -->
          <template x-if="sessionsTab === 'history'">
            <div style="flex:1;overflow-y:auto;min-height:0">
              <template x-if="historyLoading"><div class="loading"><div class="spinner"></div> Loading history…</div></template>
              <template x-if="!historyLoading && historyEntries.length === 0"><div class="empty"><div>No entries found</div></div></template>
              <template x-if="!historyLoading && historyEntries.length > 0">
                <div>
                  <template x-for="(group, label) in groupedHistoryByDate()" :key="label">
                    <div>
                      <div class="group-header" x-text="label"></div>
                      <template x-for="(e, idx) in group" :key="idx">
                        <div class="history-row" @click="e.sessionId && openSessionById(e.sessionId, '')">
                          <div class="history-time" x-text="formatTime(new Date(e.timestamp).toISOString())"></div>
                          <div class="history-body">
                            <div class="history-display" x-html="highlightText(e.display || '', historySearch)"></div>
                            <div class="history-project" x-text="e.projectName"></div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Chat viewer -->
    <template x-if="selectedSession">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <div class="chat-header">
          <button class="back-btn" @click="selectedSession = null">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2L4 7l5 5"/></svg>
            Back
          </button>
          <div class="chat-header-title">
            <h2 x-text="selectedSession.firstPrompt || selectedSession.sessionId"></h2>
            <div class="chat-header-meta">
              <template x-if="selectedSession.gitBranch">
                <span class="meta-tag branch" x-text="selectedSession.gitBranch"></span>
              </template>
              <template x-for="m in sessionDetail?.models || []" :key="m">
                <span class="meta-tag model" x-text="shortModelName(m)"></span>
              </template>
              <span style="font-size:11px;color:var(--ink-3)" x-text="formatDate(selectedSession.modified)"></span>
              <template x-if="sessionDetail?.tokens">
                <span style="display:flex;gap:6px;align-items:center;margin-left:4px;padding-left:8px;border-left:1px solid var(--rule)">
                  <span class="token-item">In <strong x-text="fmtNum(sessionDetail.tokens.input)"></strong></span>
                  <span class="token-item">Out <strong x-text="fmtNum(sessionDetail.tokens.output)"></strong></span>
                  <template x-if="sessionDetail.tokens.cacheRead > 0">
                    <span class="token-item">Cache <strong x-text="fmtNum(sessionDetail.tokens.cacheRead)"></strong></span>
                  </template>
                  <template x-if="sessionDetail.cost > 0">
                    <span class="token-item" style="margin-left:4px;padding-left:8px;border-left:1px solid var(--rule)">Cost <strong x-text="fmtCost(sessionDetail.cost)" style="color:var(--ink)"></strong></span>
                  </template>
                  <template x-if="sessionDetail.savings > 0.001">
                    <span class="token-item" style="color:var(--green)">saved <strong x-text="fmtCost(sessionDetail.savings)"></strong></span>
                  </template>
                  <template x-if="sessionDetail.carbon > 0.001">
                    <span class="token-item" style="margin-left:4px;padding-left:8px;border-left:1px solid var(--rule);color:var(--green)"><strong x-text="fmtCarbon(sessionDetail.carbon)"></strong></span>
                  </template>
                </span>
              </template>
              <!-- Bookmark navigation -->
              <template x-if="(sessionBookmarks[selectedSession?.sessionId]||[]).length > 0">
                <span style="display:flex;gap:3px;align-items:center;padding-left:8px;border-left:1px solid var(--rule)">
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="color:var(--blue)"><path d="M3 2a1 1 0 011-1h8a1 1 0 011 1v12.586l-4-4-4 4V2z"/></svg>
                  <span style="font-size:11px;color:var(--blue);margin-right:1px" x-text="(sessionBookmarks[selectedSession.sessionId]||[]).length"></span>
                  <button class="bm-nav-btn" title="Previous bookmark" @click="prevBookmark()">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 2L3 5l4 3"/></svg>
                  </button>
                  <button class="bm-nav-btn" title="Next bookmark" @click="nextBookmark()">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
                  </button>
                </span>
              </template>
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <button class="btn btn-sm" :style="cleanMode ? 'background:var(--blue);color:#fff' : 'background:var(--canvas-2);color:var(--ink)'" @click="cleanMode=!cleanMode" title="Toggle focus view">Focus</button>
            <div style="flex:1"></div>
            <span x-show="exportMsg" x-text="exportMsg" style="font-size:12px;color:var(--green)" x-transition></span>
            <span x-show="deletingSession" style="font-size:12px;color:var(--ink-3)">Deleting…</span>
            <button class="btn btn-primary btn-sm" id="resume-detail" :disabled="!sessionDetail?.resumable" :title="!sessionDetail?.resumable ? 'Session file deleted — cannot resume' : 'Copy command to resume this session'" @click="sessionDetail?.resumable && resumeSession(selectedSession.sessionId, 'resume-detail', selectedSession.projectPath)">
              Resume →
            </button>
            <!-- ⋮ dropdown -->
            <div style="position:relative">
              <button class="btn btn-sm" style="background:var(--canvas-2);color:var(--ink);border:1px solid var(--rule);padding:4px 10px;display:flex;align-items:center" @click="exportDropOpen=!exportDropOpen" @click.outside="exportDropOpen=false" title="More options">
                <svg width="3" height="15" viewBox="0 0 3 15" fill="currentColor"><circle cx="1.5" cy="1.5" r="1.5"/><circle cx="1.5" cy="7.5" r="1.5"/><circle cx="1.5" cy="13.5" r="1.5"/></svg>
              </button>
              <div x-show="exportDropOpen" x-transition style="position:absolute;top:calc(100% + 4px);right:0;background:var(--canvas,#fff);border:1px solid var(--rule);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:50;min-width:180px;overflow:hidden">
                <button class="export-drop-item" @click="exportSession(true); exportDropOpen=false">Download .md</button>
                <button class="export-drop-item" @click="copySessionMd(); exportDropOpen=false">Copy as Markdown</button>
                <button class="export-drop-item" @click="shareSession(); exportDropOpen=false" :disabled="!!shareMsg"><span x-text="shareMsg || 'Publish to Gist'"></span></button>
                <button class="export-drop-item" @click="navigator.clipboard.writeText(location.origin+location.pathname+'#/session/'+selectedSession.projectDir+'/'+selectedSession.sessionId);exportDropOpen=false">Copy local link</button>
                <div style="height:1px;background:var(--rule);margin:4px 0"></div>
                <button class="export-drop-item" style="color:var(--red)" @click="deleteSession();exportDropOpen=false" x-show="!deletingSession">Delete session</button>
              </div>
            </div>
          </div>
        </div>


        <!-- Live metrics panel -->
        <template x-if="liveSessionId === selectedSession?.sessionId">
          <div class="live-panel">
            <span class="live-badge"><span class="live-dot" style="margin-right:2px"></span>Live</span>

            <!-- Token counter (acumulado de la sesión, se refresca cada 4s) -->
            <span style="display:flex;align-items:center;gap:6px;color:var(--ink-2);padding-right:12px;border-right:1px solid rgba(255, 51, 102, 0.2)">
              <span style="color:var(--ink-3)">In</span>
              <strong x-text="fmtNum(sessionDetail?.tokens?.input || 0)"></strong>
              <span style="color:var(--ink-3)">Out</span>
              <strong x-text="fmtNum(sessionDetail?.tokens?.output || 0)"></strong>
            </span>

            <!-- Cost ticker -->
            <span style="display:flex;align-items:center;gap:4px;padding-right:12px;border-right:1px solid rgba(255, 51, 102, 0.2)">
              <strong style="font-family:'SF Mono','Fira Code',monospace;color:var(--ink)" x-text="fmtCost(sessionDetail?.cost || 0)"></strong>
              <span style="color:var(--red);font-size:11px;font-weight:700">↑</span>
            </span>

            <!-- Context window gauge -->
            <span class="ctx-gauge-wrap">
              <span style="color:var(--ink-3)">Ctx</span>
              <span class="ctx-gauge">
                <span class="ctx-gauge-fill" :class="{ warn: liveContextPct() >= 60, crit: liveContextPct() >= 85 }" :style="'width:' + liveContextPct() + '%'"></span>
              </span>
              <strong x-text="liveContextPct() + '%'" :style="liveContextPct() >= 85 ? 'color:var(--red);font-weight:700' : ''"></strong>
              <span style="color:var(--ink-3);font-size:10px">/ 200K</span>
            </span>

            <!-- Burn rate -->
            <template x-if="liveBurnRate > 0">
              <span style="color:var(--ink-3);padding-left:4px">
                <strong style="color:var(--ink-2)" x-text="fmtNum(liveBurnRate)"></strong> tok/min
              </span>
            </template>



          </div>
        </template>

        <!-- Session detail tabs -->
        <div class="pr-tabs">
          <button class="pr-tab" :class="{active: sessionDetailTab==='chat'}"
                  @click="sessionDetailTab='chat'">
            Conversation
          </button>
          <button class="pr-tab" :class="{active: sessionDetailTab==='commits'}"
                  @click="sessionDetailTab='commits'; loadSessionCommits()">
            Commits
            <template x-if="sessionCommits[selectedSession?.sessionId]?.length">
              <span class="pr-tab-badge" x-text="sessionCommits[selectedSession.sessionId].length"></span>
            </template>
          </button>
          <button class="pr-tab" :class="{active: sessionDetailTab==='files'}"
                  @click="sessionDetailTab='files'; loadSessionDiffs()">
            Files changed
            <template x-if="filesChangedDiffs.length">
              <span class="pr-tab-badge" x-text="filesChangedDiffs.length"></span>
            </template>
          </button>
          <button class="timeline-toggle" :class="{'tl-on': timelineMode}"
                  x-show="sessionDetailTab === 'chat' && (sessionDiffsLoading || splitDiffs.length > 0)"
                  @click="toggleTimeline()">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="4" cy="8" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"/>
              <path d="M4 3v3M4 10v3M8 3v3M8 10v3M12 3v3M12 10v3"/>
            </svg>
            Timeline
          </button>
        </div>

        <!-- Content row: chat/files (left) + diffs panel (right) -->
        <div id="timeline-row" style="display:flex;flex:1;overflow:hidden;min-height:0;position:relative">
          <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0">

        <!-- Commits tab -->
        <template x-if="sessionDetailTab === 'commits'">
          <div style="flex:1;overflow-y:auto">
            <template x-if="sessionCommitsLoading">
              <div class="loading"><div class="spinner"></div> Loading commits…</div>
            </template>
            <template x-if="!sessionCommitsLoading && sessionCommits[selectedSession?.sessionId]">
              <div>
                <template x-if="sessionCommits[selectedSession.sessionId].length === 0">
                  <div class="empty"><div>No git commits found in this session</div></div>
                </template>
                <template x-if="sessionCommits[selectedSession.sessionId].length > 0">
                  <div class="commit-timeline">
                    <template x-for="(c, ci) in sessionCommits[selectedSession.sessionId]" :key="ci">
                      <div class="commit-item">
                        <div class="commit-dot"></div>
                        <div class="commit-body">
                          <div class="commit-msg" :title="c.message" x-text="c.message"></div>
                          <div class="commit-meta">
                            <span x-text="c.author"></span>
                            <span x-text="formatDate(c.timestamp)"></span>
                            <span class="commit-hash" :title="'Copy ' + c.hash"
                                  @click="navigator.clipboard.writeText(c.hash).then(() => { $el.textContent = 'Copied!'; setTimeout(() => $el.textContent = c.hash, 1200) })"
                                  x-text="c.hash"></span>
                            <template x-if="c.stats.files > 0">
                              <span class="commit-stats">
                                <span style="color:var(--ink-3)" x-text="c.stats.files + ' file' + (c.stats.files !== 1 ? 's' : '') + ' changed'"></span>
                                <template x-if="c.stats.insertions > 0"><span style="color:var(--green)" x-text="'+' + c.stats.insertions"></span></template>
                                <template x-if="c.stats.deletions > 0"><span style="color:var(--red)" x-text="'−' + c.stats.deletions"></span></template>
                              </span>
                            </template>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>

        <!-- Files changed tab -->
        <template x-if="sessionDetailTab === 'files'">
          <div class="files-tab-layout">
            <!-- File tree sidebar -->
            <div class="file-tree-col" x-show="filesChangedDiffs.length > 0" :style="ftTreeVisible ? `width:${ftTreeWidth}px` : 'width:28px'">
              <div class="ft-search" :style="ftTreeVisible ? '' : 'border-bottom:none;justify-content:center;padding:6px 3px'">
                <input x-show="ftTreeVisible" type="text" x-model="ftFilter" placeholder="Filter files…" @keydown.escape="ftFilter = ''">
                <button class="ft-toggle-btn" @click="ftTreeVisible=!ftTreeVisible; localStorage.setItem('cs:ftTreeVisible', ftTreeVisible?'1':'0')"
                        :title="ftTreeVisible ? 'Hide file tree' : 'Show file tree'">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1.5" y="1.5" width="13" height="13" rx="2"/>
                    <line x1="5.5" y1="1.5" x2="5.5" y2="14.5"/>
                  </svg>
                </button>
              </div>
              <div class="file-tree" x-show="ftTreeVisible">
              <template x-for="item in fileTreeFlat" :key="item.type + ':' + (item.type==='folder' ? item.path : item.fi)">
                <button class="ft-item" :class="item.type === 'folder' ? 'ft-folder' : 'ft-file'"
                        :style="`padding-left:${10 + item.depth * 14}px`"
                        @click="item.type === 'folder' ? toggleFolder(item.path) : scrollToFile(item.fi)">
                  <span class="ft-icon">
                    <template x-if="item.type === 'folder'">
                      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                        <path x-show="!collapsedFolders[item.path]" d="M1.5 3.5A1.5 1.5 0 013 2h3.586a1.5 1.5 0 011.06.44L8.707 3.5H13A1.5 1.5 0 0114.5 5v7A1.5 1.5 0 0113 13.5H3A1.5 1.5 0 011.5 12V3.5z"/>
                        <path x-show="collapsedFolders[item.path]" d="M2 3.5A1.5 1.5 0 013.5 2h4.086a1.5 1.5 0 011.06.44l1.915 1.914A1.5 1.5 0 0011 5.414V12A1.5 1.5 0 019.5 13.5h-6A1.5 1.5 0 012 12V3.5z"/>
                      </svg>
                    </template>
                    <template x-if="item.type === 'file'">
                      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9.5 1.5H4A1.5 1.5 0 002.5 3v10A1.5 1.5 0 004 14.5h8A1.5 1.5 0 0013.5 13V5.5L9.5 1.5z"/><path d="M9.5 1.5V5.5H13.5"/>
                      </svg>
                    </template>
                  </span>
                  <span x-text="item.name" style="overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0"></span>
                  <template x-if="item.type === 'file'">
                    <span class="ft-search-btn"
                          @click.stop="goToFileSearch(item.filePath || item.name)"
                          title="Find all sessions that touched this file">
                      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
                    </span>
                  </template>
                </button>
              </template>
              </div><!-- /file-tree -->
            </div><!-- /file-tree-col -->
            <!-- Tree resize handle -->
            <div x-show="filesChangedDiffs.length > 0 && ftTreeVisible"
                 @mousedown.prevent="
                   const startX = $event.clientX;
                   const startW = ftTreeWidth;
                   const onMove = e => { ftTreeWidth = Math.max(140, Math.min(480, startW + (e.clientX - startX))); };
                   const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.body.style.cursor = ''; document.body.style.userSelect = ''; localStorage.setItem('cs:ftTreeWidth', ftTreeWidth); };
                   document.addEventListener('mousemove', onMove);
                   document.addEventListener('mouseup', onUp);
                   document.body.style.cursor = 'col-resize';
                   document.body.style.userSelect = 'none';
                 "
                 style="width:5px;flex-shrink:0;cursor:col-resize;background:transparent;border-right:1px solid var(--rule);transition:background 0.15s;z-index:1"
                 @mouseenter="$el.style.background='var(--rule-2)'" @mouseleave="$el.style.background='transparent'">
            </div>
            <!-- Diff content -->
            <div style="flex:1;overflow-y:auto" id="files-changed-content">
            <!-- Toolbar -->
            <div class="fc-toolbar" x-show="filesChangedDiffs.length > 0" @click.outside="fcLayoutOpen=false" style="position:relative">
              <button class="fc-gear-btn" @click="fcLayoutOpen=!fcLayoutOpen">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M11.9 3.4l-.7.7M3.4 11.9l.7-.7"/>
                </svg>
                <span x-text="fcLayout === 'split' ? 'Split' : 'Unified'"></span>
                <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3.5l3 3 3-3"/></svg>
              </button>
              <div class="fc-gear-drop" x-show="fcLayoutOpen" x-transition>
                <button class="fc-gear-item" :class="{active: fcLayout==='unified'}"
                        @click="fcLayout='unified'; localStorage.setItem('cs:fcLayout','unified'); fcLayoutOpen=false">
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="2.5" rx="0.5"/><rect x="2" y="7" width="12" height="2.5" rx="0.5"/><rect x="2" y="11" width="12" height="2.5" rx="0.5"/></svg>
                  Unified
                </button>
                <button class="fc-gear-item" :class="{active: fcLayout==='split'}"
                        @click="fcLayout='split'; localStorage.setItem('cs:fcLayout','split'); fcLayoutOpen=false">
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="5" height="10" rx="0.5"/><rect x="9" y="3" width="5" height="10" rx="0.5"/></svg>
                  Split
                </button>
              </div>
            </div>
            <div style="padding:16px 20px">
            <template x-if="sessionDiffsLoading">
              <div class="loading"><div class="spinner"></div> Loading changes…</div>
            </template>
            <template x-if="!sessionDiffsLoading && filesChangedDiffs.length === 0">
              <div class="empty"><div>No file changes in this session</div></div>
            </template>
            <template x-for="(file, fi) in filesChangedDiffs" :key="fi">
              <div class="diff-rp-file" style="margin-bottom:8px" :data-fc-fi="fi"
                   x-init="
                     const k = 'viewed:' + (selectedSession?.sessionId||'') + ':fc:' + fi;
                     if (localStorage.getItem(k) === '1') { file._viewed = true; file._open = false; }
                   ">
                <div class="diff-rp-header">
                  <button class="diff-rp-icon" @click="file._open = file._open === false"
                          :title="file._open === false ? 'Expand' : 'Collapse'">
                    <svg width="11" height="11" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"
                         :style="file._open === false ? '' : 'transform:rotate(90deg)'"
                         style="transition:transform 0.15s"><path d="M3 2l4 3-4 3"/></svg>
                  </button>
                  <div style="flex:1;min-width:0;display:flex;align-items:center;gap:0;overflow:hidden">
                    <div style="min-width:0;direction:rtl;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" :title="file.filePath">
                      <span style="direction:ltr;unicode-bidi:bidi-override;font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:var(--ink)" x-text="file.filePath"></span>
                    </div>
                    <button class="diff-rp-icon" style="flex-shrink:0" title="Copy file path"
                            @click.stop="navigator.clipboard.writeText(file.filePath).then(() => { $el.style.color='var(--green)'; setTimeout(()=>$el.style.color='',1200) })">
                      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5.5" y="5.5" width="8" height="9" rx="1.5"/><path d="M10.5 5.5V3.5A1.5 1.5 0 009 2H3.5A1.5 1.5 0 002 3.5V10A1.5 1.5 0 003.5 11.5H5"/></svg>
                    </button>
                  </div>
                  <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:4px">
                    <span style="font-size:10px;font-weight:600;color:var(--green)" x-show="file.totalAdded > 0" x-text="'+'+file.totalAdded"></span>
                    <span style="font-size:10px;font-weight:600;color:var(--red);margin-left:2px" x-show="file.totalRemoved > 0" x-text="'−'+file.totalRemoved"></span>
                    <label style="display:flex;align-items:center;gap:3px;font-size:10px;cursor:pointer;user-select:none;padding-left:6px;border-left:1px solid var(--rule)"
                           :style="file._viewed ? 'color:var(--ink)' : 'color:var(--ink-3)'" title="Mark as viewed">
                      <input type="checkbox" :checked="file._viewed"
                             @change="
                               file._viewed = $event.target.checked;
                               localStorage.setItem('viewed:' + (selectedSession?.sessionId||'') + ':fc:' + fi, file._viewed ? '1' : '0');
                               file._open = !file._viewed;
                             "
                             style="width:11px;height:11px;cursor:pointer;accent-color:var(--blue);flex-shrink:0">
                      <span>Viewed</span>
                    </label>
                  </div>
                </div>
                <template x-if="file._open !== false">
                  <div class="fc-hunks-wrap">
                    <div class="fc-hunks-inner">
                    <template x-for="(change, ci) in file.changes" :key="ci">
                      <template x-for="(hunk, hi) in change.hunks" :key="hi">
                        <div class="diff-hunk">
                          <!-- Unified -->
                          <template x-if="fcLayout === 'unified'">
                            <div>
                              <template x-for="(dl, li) in hunk" :key="li">
                                <div class="diff-line" :class="dl.type">
                                  <span class="diff-gutter" x-text="dl.type === 'add' ? '+' : dl.type === 'remove' ? '-' : ' '"></span>
                                  <span class="diff-content" x-html="dl._html ?? dl.line"></span>
                                </div>
                              </template>
                            </div>
                          </template>
                          <!-- Split -->
                          <template x-if="fcLayout === 'split'">
                            <div>
                              <template x-for="(row, ri) in splitRows(hunk)" :key="ri">
                                <div class="split-row">
                                  <div class="split-cell" :class="'sc-' + row.lt">
                                    <span class="diff-gutter" x-text="row.lt === 'remove' ? '-' : ' '"></span>
                                    <span class="diff-content" x-html="row.l ? (row.l._html ?? row.l.line) : ''"></span>
                                  </div>
                                  <div class="split-cell" :class="'sc-' + row.rt">
                                    <span class="diff-gutter" x-text="row.rt === 'add' ? '+' : ' '"></span>
                                    <span class="diff-content" x-html="row.r ? (row.r._html ?? row.r.line) : ''"></span>
                                  </div>
                                </div>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                    </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            </div><!-- /padding -->
            </div><!-- /files-changed-content -->
          </div><!-- /files-tab-layout -->
        </template>

        <div class="chat-messages" id="chat-col" x-show="sessionDetailTab === 'chat'">
          <template x-if="loadingDetail">
            <div class="loading"><div class="spinner"></div> Loading conversation…</div>
          </template>
          <template x-if="!loadingDetail">
            <template x-for="(msg, idx) in sessionDetail?.messages || []" :key="msg.uuid || idx">
              <div :data-ts="msg.timestamp" :data-uuid="msg.uuid">
                <!-- User message -->
                <template x-if="msg.type === 'user'">
                  <div class="message user" x-show="!cleanMode || msgHasText(msg)">
                    <div class="message-role">You</div>
                    <div class="message-bubble">
                      <template x-for="(block, bi) in getUserBlocks(msg)" :key="bi">
                        <div>
                          <template x-if="block.type === 'slash-command'">
                            <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:4px;background:var(--canvas-2);border:1px solid var(--rule-2);color:var(--ink-2);font-family:monospace" x-text="block.command"></span>
                          </template>
                          <template x-if="block.type === 'text'">
                            <div x-html="renderInlineCode(block.text)" style="white-space:pre-wrap"></div>
                          </template>
                          <template x-if="block.type === 'tool_result' && !cleanMode">
                            <div class="collapsible" style="margin-top:6px">
                              <div class="collapsible-header" @click="block._open = !block._open">
                                <svg class="collapsible-chevron" :class="{open:block._open}" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
                                <span>Tool result</span>
                                <template x-if="block.is_error"><span style="color:var(--red);margin-left:4px;font-size:11px">error</span></template>
                              </div>
                              <template x-if="block._open">
                                <div class="collapsible-body">
                                  <div class="tool-result-stdout" :class="{'tool-result-error':block.is_error}"
                                    x-text="typeof block.content==='string'?block.content:JSON.stringify(block.content,null,2)"></div>
                                </div>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                    <div class="message-footer">
                      <span class="msg-meta" x-text="formatTime(msg.timestamp)"></span>
                      <button class="bookmark-btn" :class="{bookmarked: isBookmarked(msg.uuid)}"
                              @click.stop="toggleBookmark(msg)" title="Bookmark">
                        <svg width="12" height="12" viewBox="0 0 16 16" :fill="isBookmarked(msg.uuid)?'currentColor':'none'" stroke="currentColor" stroke-width="1.5"><path d="M3 2a1 1 0 011-1h8a1 1 0 011 1v12.586l-4-4-4 4V2z"/></svg>
                      </button>
                    </div>
                  </div>
                </template>

                <!-- Assistant message -->
                <template x-if="msg.type === 'assistant'">
                  <div class="message assistant" x-show="!cleanMode || msgHasText(msg)">
                    <div class="message-role">
                      <svg fill="currentColor" fill-rule="evenodd" width="16" height="16" viewBox="0 0 24 24" style="color:var(--ink-3)" xmlns="http://www.w3.org/2000/svg"><path d="M4.709 15.955l4.72-2.647.08-.23-.08-.128H9.2l-.79-.048-2.698-.073-2.339-.097-2.266-.122-.571-.121L0 11.784l.055-.352.48-.321.686.06 1.52.103 2.278.158 1.652.097 2.449.255h.389l.055-.157-.134-.098-.103-.097-2.358-1.596-2.552-1.688-1.336-.972-.724-.491-.364-.462-.158-1.008.656-.722.881.06.225.061.893.686 1.908 1.476 2.491 1.833.365.304.145-.103.019-.073-.164-.274-1.355-2.446-1.446-2.49-.644-1.032-.17-.619a2.97 2.97 0 01-.104-.729L6.283.134 6.696 0l.996.134.42.364.62 1.414 1.002 2.229 1.555 3.03.456.898.243.832.091.255h.158V9.01l.128-1.706.237-2.095.23-2.695.08-.76.376-.91.747-.492.584.28.48.685-.067.444-.286 1.851-.559 2.903-.364 1.942h.212l.243-.242.985-1.306 1.652-2.064.73-.82.85-.904.547-.431h1.033l.76 1.129-.34 1.166-1.064 1.347-.881 1.142-1.264 1.7-.79 1.36.073.11.188-.02 2.856-.606 1.543-.28 1.841-.315.833.388.091.395-.328.807-1.969.486-2.309.462-3.439.813-.042.03.049.061 1.549.146.662.036h1.622l3.02.225.79.522.474.638-.079.485-1.215.62-1.64-.389-3.829-.91-1.312-.329h-.182v.11l1.093 1.068 2.006 1.81 2.509 2.33.127.578-.322.455-.34-.049-2.205-1.657-.851-.747-1.926-1.62h-.128v.17l.444.649 2.345 3.521.122 1.08-.17.353-.608.213-.668-.122-1.374-1.925-1.415-2.167-1.143-1.943-.14.08-.674 7.254-.316.37-.729.28-.607-.461-.322-.747.322-1.476.389-1.924.315-1.53.286-1.9.17-.632-.012-.042-.14.018-1.434 1.967-2.18 2.945-1.726 1.845-.414.164-.717-.37.067-.662.401-.589 2.388-3.036 1.44-1.882.93-1.086-.006-.158h-.055L4.132 18.56l-1.13.146-.487-.456.061-.746.231-.243 1.908-1.312-.006.006z"></path></svg>
                    </div>
                    <div class="message-bubble">
                      <template x-for="(block, bi) in getAssistantBlocks(msg)" :key="bi">
                        <div>
                          <template x-if="block.type === 'thinking' && !cleanMode">
                            <div class="collapsible">
                              <div class="collapsible-header" @click="block._open = !block._open">
                                <svg class="collapsible-chevron" :class="{open:block._open}" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
                                <span style="color:var(--ink-3)">Thinking</span>
                              </div>
                              <template x-if="block._open">
                                <div class="collapsible-body"><div class="thinking-text" x-text="block.thinking"></div></div>
                              </template>
                            </div>
                          </template>
                          <template x-if="block.type === 'text' && block.text">
                            <div class="md-content" x-html="renderMd(block.text)"></div>
                          </template>
                          <template x-if="block.type === 'tool_use' && !cleanMode">
                            <div class="collapsible">
                              <div class="collapsible-header" @click="block._open = !block._open">
                                <svg class="collapsible-chevron" :class="{open:block._open}" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg>
                                <span class="tool-name" x-text="block.name"></span>
                                <span style="color:var(--ink-3);font-size:11px;margin-left:6px;font-family:'SF Mono','Fira Code',monospace" x-text="getToolSummary(block)"></span>
                                <template x-if="block.name === 'Agent'">
                                  <span style="margin-left:auto;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--blue);border:1px solid rgba(26,70,192,0.3);padding:0 5px"
                                    x-text="block.input?.subagent_type || 'agent'"></span>
                                </template>
                              </div>
                              <template x-if="block._open">
                                <div class="collapsible-body tool-input">
                                  <pre x-text="JSON.stringify(block.input, null, 2)"></pre>
                                  <template x-if="block.name === 'Agent' && block.input?.subagent_type">
                                    <div class="subagent-section" style="margin-top:10px">
                                      <div class="subagent-header" @click="toggleSubagent(block, selectedSession.projectDir, selectedSession.sessionId)">
                                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4.5"/><line x1="6" y1="3.5" x2="6" y2="6"/><circle cx="6" cy="8" r="0.7" fill="currentColor"/></svg>
                                        <span x-text="'Subagent — ' + (block.input.subagent_type || 'agent')"></span>
                                        <template x-if="block._subagentLoading"><div class="spinner" style="margin-left:auto;width:12px;height:12px;border-width:1.5px"></div></template>
                                        <template x-if="!block._subagentLoading">
                                          <span style="margin-left:auto;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em" x-text="block._subagentOpen ? 'Hide' : 'Show transcript'"></span>
                                        </template>
                                      </div>
                                      <template x-if="block._subagentOpen && block._subagentMessages">
                                        <div class="subagent-body">
                                          <template x-for="(sm, si) in block._subagentMessages" :key="si">
                                            <div style="margin-bottom:8px;font-size:12px">
                                              <template x-if="sm.type === 'user'">
                                                <div style="color:var(--blue);padding:4px 0;border-bottom:1px solid var(--rule)">
                                                  <span style="font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:0.06em">User</span>
                                                  <span style="color:var(--ink-2);margin-left:8px" x-text="getSubagentText(sm).slice(0,200)"></span>
                                                </div>
                                              </template>
                                              <template x-if="sm.type === 'assistant'">
                                                <div style="color:var(--ink-2);padding:4px 0">
                                                  <span style="font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:0.06em;color:var(--ink)">Claude</span>
                                                  <span style="margin-left:8px" x-text="getSubagentText(sm).slice(0,300)"></span>
                                                </div>
                                              </template>
                                            </div>
                                          </template>
                                        </div>
                                      </template>
                                    </div>
                                  </template>
                                </div>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                    <div class="message-footer">
                      <template x-if="msg.message?.model">
                        <span class="msg-meta" x-text="shortModelName(msg.message.model)"></span>
                      </template>
                      <span class="msg-meta" x-text="formatTime(msg.timestamp)"></span>
                      <button class="bookmark-btn" :class="{bookmarked: isBookmarked(msg.uuid)}"
                              @click.stop="toggleBookmark(msg)" title="Bookmark">
                        <svg width="12" height="12" viewBox="0 0 16 16" :fill="isBookmarked(msg.uuid)?'currentColor':'none'" stroke="currentColor" stroke-width="1.5"><path d="M3 2a1 1 0 011-1h8a1 1 0 011 1v12.586l-4-4-4 4V2z"/></svg>
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </template>
        </div><!-- /chat-messages -->
          </div><!-- /left col -->

          <!-- Resize handle -->
          <div x-show="sessionDetailTab === 'chat' && timelineMode && (sessionDiffsLoading || splitDiffs.length > 0)"
               @mousedown.prevent="
                 const startX = $event.clientX;
                 const startW = diffsPanelWidth;
                 const onMove = e => { diffsPanelWidth = Math.max(180, Math.min(window.innerWidth * 0.6, startW - (e.clientX - startX))); };
                 const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.body.style.cursor = ''; document.body.style.userSelect = ''; localStorage.setItem('cs:diffsPanelWidth', diffsPanelWidth); };
                 document.addEventListener('mousemove', onMove);
                 document.addEventListener('mouseup', onUp);
                 document.body.style.cursor = 'col-resize';
                 document.body.style.userSelect = 'none';
               "
               style="width:5px;flex-shrink:0;cursor:col-resize;background:transparent;border-left:1px solid var(--rule);transition:background 0.15s;z-index:1"
               @mouseenter="$el.style.background='var(--rule-2)'" @mouseleave="$el.style.background='transparent'">
          </div>
          <!-- Right panel: diffs synchronized with chat scroll -->
          <div class="split-diffs-panel" id="split-diffs-panel"
               :style="`width:${diffsPanelWidth}px`"
               x-show="sessionDetailTab === 'chat' && timelineMode && (sessionDiffsLoading || splitDiffs.length > 0)">
            <template x-if="sessionDiffsLoading && !sessionDiffs[selectedSession?.sessionId]">
              <div style="display:flex;align-items:center;gap:8px;padding:16px;color:var(--ink-3);font-size:12px">
                <div class="spinner" style="width:14px;height:14px;border-width:1.5px;flex-shrink:0"></div>
                Loading changes…
              </div>
            </template>
            <template x-for="(group, gi) in splitDiffs" :key="gi">
              <div class="diff-group" :class="{active: activeDiffTs === group.timestamp}" :data-diff-ts="group.timestamp">
                <template x-for="(change, ci) in group.changes" :key="ci">
                  <div class="diff-rp-file">
                    <!-- GitHub-style file header -->
                    <div class="diff-rp-header">
                      <!-- Collapse toggle -->
                      <button class="diff-rp-icon" @click="change._open = change._open === false"
                              :title="change._open === false ? 'Expand file' : 'Collapse file'">
                        <svg width="11" height="11" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"
                             :style="change._open === false ? '' : 'transform:rotate(90deg)'"
                             style="transition:transform 0.15s"><path d="M3 2l4 3-4 3"/></svg>
                      </button>
                      <!-- Left group: filename + copy (flex:1, truncates from the left) -->
                      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:0;overflow:hidden">
                        <div style="min-width:0;direction:rtl;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                             :title="change.filePath">
                          <span style="direction:ltr;unicode-bidi:bidi-override;font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:var(--ink)"
                                x-text="change.filePath"></span>
                        </div>
                        <button class="diff-rp-icon" style="flex-shrink:0" title="Copy file path"
                                @click.stop="navigator.clipboard.writeText(change.filePath).then(() => { $el.style.color='var(--green)'; setTimeout(()=>$el.style.color='',1200) })">
                          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="5.5" y="5.5" width="8" height="9" rx="1.5"/>
                            <path d="M10.5 5.5V3.5A1.5 1.5 0 009 2H3.5A1.5 1.5 0 002 3.5V10A1.5 1.5 0 003.5 11.5H5"/>
                          </svg>
                        </button>
                      </div>
                      <!-- Right group: expand-all + stats + viewed -->
                      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:4px">
                        <!-- Expand / collapse all lines (only for Edit) -->
                        <template x-if="change.allLines">
                          <button class="diff-rp-icon"
                                  :title="change._allLines ? 'Collapse to diff hunks' : 'Expand all lines'"
                                  @click="change._allLines = !change._allLines; if (change._allLines) change._open = true">
                            <template x-if="!change._allLines">
                              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                <line x1="2" y1="8" x2="14" y2="8"/>
                                <polyline points="5 5 8 2 11 5"/><polyline points="5 11 8 14 11 11"/>
                              </svg>
                            </template>
                            <template x-if="change._allLines">
                              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                <line x1="2" y1="8" x2="14" y2="8"/>
                                <polyline points="5 2 8 5 11 2"/><polyline points="5 14 8 11 11 14"/>
                              </svg>
                            </template>
                          </button>
                        </template>
                        <!-- Stats -->
                        <div style="font-size:10px;font-weight:600;display:flex;gap:2px;padding:0 2px"
                             :title="`${change.added} addition${change.added!==1?'s':''} & ${change.removed} deletion${change.removed!==1?'s':''}`">

                          <span style="color:var(--red)" x-show="change.removed > 0" x-text="'−'+change.removed"></span>
                        </div>
                        <!-- Viewed -->

                               :style="change._viewed ? 'color:var(--ink)' : 'color:var(--ink-3)'"
                               title="Mark as viewed">
                          <input type="checkbox"
                                 :checked="change._viewed"
                                 @change="
                                   change._viewed = $event.target.checked;
                                   localStorage.setItem('viewed:' + (selectedSession?.sessionId||'') + ':' + change._idx, change._viewed ? '1' : '0');
                                   change._open = !change._viewed;
                                 "
                                 style="width:11px;height:11px;cursor:pointer;accent-color:var(--blue);flex-shrink:0">
                          <span>Viewed</span>
                        </label>
                      </div>
                    </div>
                    <!-- Diff content -->
                    <template x-if="change._open !== false">
                      <div>
                        <!-- All lines mode -->
                        <template x-if="change._allLines">
                          <div class="diff-hunk">
                            <template x-for="(dl, li) in change.allLines" :key="li">
                              <div class="diff-line" :class="dl.type">
                                <span class="diff-gutter" x-text="dl.type === 'add' ? '+' : dl.type === 'remove' ? '-' : ' '"></span>
                                <span class="diff-content" x-html="dl._html ?? dl.line"></span>
                              </div>
                            </template>
                          </div>
                        </template>
                        <!-- Normal hunks mode -->
                        <template x-if="!change._allLines">
                          <div>
                            <template x-for="(hunk, hi) in change.hunks" :key="hi">
                              <div class="diff-hunk">
                                <template x-for="(dl, li) in hunk" :key="li">
                                  <div class="diff-line" :class="dl.type">
                                    <span class="diff-gutter" x-text="dl.type === 'add' ? '+' : dl.type === 'remove' ? '-' : ' '"></span>
                                    <span class="diff-content" x-html="dl._html ?? dl.line"></span>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div><!-- /right panel -->

          <div class="tl-sync-marker" x-show="timelineMode && sessionDetailTab === 'chat'" :style="`top:${tlMarker*100}%`"></div>

                        <template x-if="pluginsItems.agents?.length>0">

                              <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" class="details-chevron"><path d="M3 2l4 3-4 3"/></svg>

                                  <span style="font-size:12px;font-weight:500;color:var(--ink)" x-text="a.name||a.slug"></span>
                                  <span x-show="a.description" style="font-size:11px;color:var(--ink-3)" x-text="a.description"></span>
                                </div>
                              </template>
                            </div>
                          </details>
                        </template>
                        <template x-if="pluginsItems.commands?.length>0">
                          <details open>
                            <summary style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink);padding:4px 0;user-select:none">
                              <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" class="details-chevron"><path d="M3 2l4 3-4 3"/></svg>
                              Commands <span style="font-weight:400;color:var(--ink-3)" x-text="'('+pluginsItems.commands.length+')'"></span>
                            </summary>
                            <div style="margin-top:4px;display:flex;flex-direction:column;gap:1px">
                              <template x-for="c in pluginsItems.commands" :key="c.slug">
                                <div @click="goToPluginCommand(c.slug)" style="padding:4px 8px;border-radius:4px;cursor:pointer;display:flex;flex-direction:column" @mouseover="$el.style.background='var(--canvas)'" @mouseout="$el.style.background='transparent'">
                                  <span style="font-size:12px;font-weight:500;color:var(--ink)" x-text="'/'+c.slug"></span>
                                  <span x-show="c.description" style="font-size:11px;color:var(--ink-3)" x-text="c.description"></span>

                            </div>
                          </details>

                      </div>
                    </template>

                      </template>
                      <button class="btn btn-outline btn-sm"

                      <button class="btn btn-outline btn-sm" style="color:var(--red)"
                        :disabled="pluginAction.loading&&pluginAction.id===(pluginsSelected.pluginId||pluginsSelected.name)"

                      <span x-show="pluginAction.id===(pluginsSelected.pluginId||pluginsSelected.name)&&pluginAction.msg" style="font-size:11px;color:var(--red)" x-text="pluginAction.msg"></span>

              </div><!-- /detail panel -->
            </div><!-- /tools-layout -->
        </div><!-- /flex container -->
      </div>
    </template>

    <!-- Memory view -->
    <template x-if="view === 'memory' && !selectedSession">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <div class="topbar">
          <span class="topbar-title">Memory</span>
          <span style="font-size:11px;color:var(--ink-3)" x-show="memoryFiles.length>0" x-text="memoryFiles.length + ' files'"></span>

            <template x-if="selectedMemory && memoryEditing">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="save-msg" x-show="memoryMsg==='Saved'" x-text="memoryMsg"></span>
                <span class="err-msg" x-show="memoryMsg && memoryMsg!=='Saved'" x-text="memoryMsg"></span>

              </div>
            </template>
            <template x-if="selectedMemory && !memoryEditing">
              <div style="display:flex;align-items:center;gap:8px">
                <button class="btn btn-sm btn-outline" @click="memoryEditing=true;memoryDraft=selectedMemory.content">Editar</button>
                <div style="position:relative">
                  <button class="btn btn-sm" style="background:var(--canvas-2);color:var(--ink);border:1px solid var(--rule);padding:4px 10px;display:flex;align-items:center" @click="memoryDropOpen=!memoryDropOpen" @click.outside="memoryDropOpen=false" title="More options">
                    <svg width="3" height="15" viewBox="0 0 3 15" fill="currentColor"><circle cx="1.5" cy="1.5" r="1.5"/><circle cx="1.5" cy="7.5" r="1.5"/><circle cx="1.5" cy="13.5" r="1.5"/></svg>
                  </button>
                  <div x-show="memoryDropOpen" x-transition style="position:absolute;top:calc(100% + 4px);right:0;background:var(--canvas,#fff);border:1px solid var(--rule);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:50;min-width:160px;overflow:hidden">
                    <button class="export-drop-item" style="color:var(--red)" @click="deleteMemory(); memoryDropOpen=false">Delete file</button>
                  </div>
                </div>
              </div>
            </template>
            <button class="btn btn-primary btn-sm" @click="memoryNewModal=true">+ Nueva</button>
          </div>
        </div>
        <span class="section-sub">Persistent context Claude reads each session</span>
        <div style="flex:1;overflow:hidden;">
          <template x-if="memoryLoading"><div class="loading"><div class="spinner"></div> Loading…</div></template>
          <template x-if="!memoryLoading && memoryFiles.length === 0">
            <div class="empty">
              <div class="empty-mark"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.31 2.69-6 6-6s6 2.69 6 6"/></svg></div>
              <div style="font-size:13px;color:var(--ink-2);font-weight:500;margin-bottom:4px">No memory files yet</div>
              <div style="font-size:12px;color:var(--ink-4);max-width:300px;text-align:center;line-height:1.5">Memory files let Claude remember facts across sessions. Claude reads them automatically at the start of each conversation.</div>
            </div>
          </template>
          <template x-if="!memoryLoading && memoryFiles.length > 0">
            <div class="memory-layout">
              <div class="memory-sidebar" :style="'width:'+sidebarW+'px'">

                      <span class="type-icon" x-html="memoryTypeIcon(type)"></span>
                      <span x-text="type"></span>
                    </div>
                    <template x-for="f in files" :key="f.filename+f.projectDir">
                      <div class="memory-row" :class="{active: selectedMemory?.filename===f.filename && selectedMemory?.projectDir===f.projectDir}"
                           @click="selectedMemory=f;memoryEditing=false;memoryDraft=''">
                        <div class="memory-row-name" x-text="f.name || f.filename"></div>
                        <div class="memory-row-desc" x-text="f.description || f.filename"></div>
                        <div style="font-size:10px;color:var(--ink-4);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="shortProjectName(projects.find(p=>p.dirName===f.projectDir)?.projectPath||f.projectDir||'')"></div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
              <div class="resize-handle" @mousedown.prevent="startResize($event)"></div>
              <div class="memory-detail">
                <template x-if="!selectedMemory"><div class="memory-empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Select a memory file</div></template>
                <template x-if="selectedMemory && !memoryEditing">
                  <div>
                    <div class="memory-detail-title" x-text="selectedMemory.name || selectedMemory.filename"></div>
                    <div class="memory-detail-meta">
                      <span :class="'type-pill type-'+(selectedMemory.type||'unknown')" x-text="selectedMemory.type||'unknown'"></span>
                      <span class="memory-filename" x-text="selectedMemory.filename"></span>
                      <span style="font-size:11px;color:var(--ink-3);margin-left:4px" x-text="shortProjectName(projects.find(p=>p.dirName===selectedMemory.projectDir)?.projectPath||selectedMemory.projectDir||'')"></span>
                    </div>
                    <template x-if="selectedMemory.description"><div class="memory-desc-intro" x-text="selectedMemory.description"></div></template>
                    <div class="memory-content md-content" x-html="renderMd(selectedMemory.content)"></div>
                  </div>
                </template>
                <template x-if="selectedMemory && memoryEditing">
                  <div style="height:100%;display:flex;flex-direction:column">
                    <textarea class="edit-textarea" style="flex:1;resize:none;border:none;outline:none;padding:0;font-family:inherit;font-size:13.5px;line-height:1.75;background:transparent" x-model="memoryDraft"></textarea>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Agents view -->
    <template x-if="view === 'agents' && !selectedSession">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">

          <span class="topbar-title">Agents</span>
          <div style="display:flex;align-items:center;gap:8px">

          <template x-if="!configLoading&&view==='config'&&config">

                          <option value="haiku">haiku — fast and efficient, simple tasks</option>
                          <option value="opusplan">opusplan — Opus for planning, Sonnet for execution</option>

                          <option value="opus[1m]">opus[1m] — Opus con contexto de 1M tokens</option>

                    </div>
                  </div>
                  <div class="config-row">
                    <div class="config-key">Output style</div>

                      <select class="settings-input" x-model="settingsDraft.outputStyle">

                    </div>
                  </div>
                  <div class="config-row">
                    <div class="config-key">Effort level</div>
                    <div class="config-val" style="flex:1">
                      <select class="settings-input" x-model="settingsDraft.effortLevel">
                        <option value="">auto (por defecto del modelo)</option>
                        <option value="low">low — fast and cheap, simple tasks</option>
                        <option value="medium">medium — equilibrio velocidad/razonamiento (recomendado)</option>
                        <option value="high">high — razonamiento profundo, debugging complejo</option>
                      </select>

                  </div>
                  <div class="config-row">
                    <div class="config-key">Default mode</div>

                      <select class="settings-input" x-model="settingsDraft.defaultMode">

                  </div>

                    <div class="config-key">Language</div>

                        <option value="español">Spanish</option>
                        <option value="français">Français</option>
                        <option value="deutsch">Deutsch</option>
                        <option value="português">Português</option>
                        <option value="italiano">Italiano</option>
                        <option value="日本語">日本語</option>
                        <option value="中文">中文</option>
                      </select>
                    </div>
                  </div>
                  <div class="config-row">
                    <div class="config-key">Voice</div>

                      </label>
                    </div>
                  </div>
                  <template x-if="config.settings?.statusLine?.command"><div class="config-row"><div class="config-key">Status line</div><div class="config-val" x-text="config.settings.statusLine.command"></div></div></template>
                  <div class="config-row">
                    <div class="config-key">Show Analytics</div>
                    <div class="config-val">
                      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">

                        <span style="font-size:12px;color:var(--ink-2)" x-text="showInsights ? 'Visible' : 'Hidden'"></span>
                      </label>
                      <div style="font-size:11px;color:var(--ink-3);margin-top:3px">Show Analytics (Insights) in the Widgets section.</div>
                    </div>
                  </div>
                  <div class="config-row">

                        <span style="font-size:12px;color:var(--ink-2)" x-text="showTemplates ? 'Visible' : 'Hidden'"></span>
                      </label>
                      <div style="font-size:11px;color:var(--ink-3);margin-top:3px">Show Prompt Templates in the Widgets section.</div>
                    </div>
                  </div>

                        <option value="agents">Agents</option>

                      <button class="btn btn-primary btn-sm" @click="saveGithubToken()" :disabled="githubTokenSaving || !githubTokenDraft">
                        <span x-text="githubTokenSaving?'Saving…':'Save'"></span>
                      </button>
                    </div>
                  </div>
                  <div class="config-row">
                    <div class="config-key">GitHub token</div>

                          <span>Token saved (<span x-text="githubTokenMasked"></span>). Enter a new value to replace it.</span>
                        </template>
                        <template x-if="!githubTokenSet">
                          <span>Permite publicar sesiones, planes y notas como Gists públicos de GitHub — útil para compartir conversaciones o notas con otros sin necesidad de cuenta. Genera un classic token en github.com/settings/tokens con el scope <strong>gist</strong> activado.</span>
                        </template>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="config-section">
                  <div class="config-section-title" style="display:flex;align-items:center;justify-content:space-between">

                    <div style="display:flex;align-items:center;gap:8px">

                      <span class="err-msg"  x-show="budgetMsg && budgetMsg!=='Saved'" x-text="budgetMsg"></span>
                      <button class="btn btn-primary btn-sm" @click="saveBudget()">Save</button>
                    </div>
                  </div>
                  <div class="config-row">
                    <div class="config-key">Monthly limit</div>
                    <div class="config-val" style="flex:1">
                      <div style="display:flex;align-items:center;gap:8px">

                      </div>

                      <template x-if="budgetMonthly > 0 && insights">
                        <div style="margin-top:8px;font-size:11.5px;color:var(--ink-2)">

                            <span :style="budgetStatus().status === 'over' ? 'color:var(--red)' : budgetStatus().status === 'warn' ? 'color:#f59e0b' : 'color:var(--green)'">
                              (<span x-text="Math.round(budgetStatus().pct*100)+'%'"></span>)

                          </template>
                        </div>
                      </template>
                    </div>

                </div>

                <div class="config-section">

                      <div style="display:flex;align-items:center;gap:10px">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                          <input type="checkbox" :checked="liveNotifyEnabled" @change="toggleLiveNotify()" style="width:14px;height:14px;cursor:pointer" />

                        </label>
                        <template x-if="liveNotifyEnabled">
                          <button class="btn btn-outline btn-sm" @click="_unlockAudio(); _playDone()" title="Preview sound">▶ Sound</button>
                        </template>
                        <template x-if="liveNotifyEnabled">
                          <button class="btn btn-outline btn-sm" @click="_unlockAudio(); _testOsNotification()" title="Test OS notification">🔔 OS Notif</button>
                        </template>
                      </div>
                      <div style="font-size:11px;color:var(--ink-3);margin-top:4px">Plays a soft sound + OS notification when Claude finishes a response. Activates for any live session.</div>
                      <!-- OS permission status -->
                      <template x-if="liveNotifyEnabled">
                        <div style="margin-top:8px;padding:8px 10px;border-radius:6px;font-size:11.5px;display:flex;align-items:flex-start;gap:8px"
                          :style="osNotifPermission === 'granted'
                            ? 'background:color-mix(in srgb,var(--green) 10%,transparent);color:var(--ink-2)'
                            : 'background:color-mix(in srgb,var(--red) 10%,transparent);color:var(--ink-1)'">
                          <!-- granted -->
                          <template x-if="osNotifPermission === 'granted'">
                            <span style="display:flex;flex-direction:column;gap:6px;width:100%">
                              <span style="display:flex;align-items:center;gap:6px">
                                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="2 7 5 10 11 3"/></svg>
                                Browser permission: allowed
                              </span>
                              <span style="color:var(--ink-2);line-height:1.5">
                                macOS controls banners separately. If notifications only appear in the sidebar (Notification Center) and not as popups, you have "Deliver Quietly" on.<br/>
                                <a href="x-apple.systempreferences:com.apple.preference.notifications" style="color:var(--accent);text-decoration:underline;font-weight:500">System Settings → Notifications</a>
                                → your browser → set style to <strong>Banners</strong> or <strong>Alerts</strong>
                              </span>
                            </span>
                          </template>
                          <!-- default (not yet asked) -->
                          <template x-if="osNotifPermission === 'default'">
                            <span style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="var(--yellow,#f5a623)" stroke-width="2"><circle cx="6.5" cy="6.5" r="5"/><line x1="6.5" y1="4" x2="6.5" y2="7"/><circle cx="6.5" cy="9.5" r="0.5" fill="var(--yellow,#f5a623)"/></svg>
                              Browser permission not yet granted —
                              <button class="btn btn-outline btn-sm" style="padding:1px 6px;font-size:11px" @click="_testOsNotification()">Grant permission</button>
                            </span>
                          </template>
                          <!-- denied -->
                          <template x-if="osNotifPermission === 'denied'">
                            <span style="display:flex;flex-direction:column;gap:5px">
                              <span style="display:flex;align-items:center;gap:6px">
                                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="var(--red)" stroke-width="2"><circle cx="6.5" cy="6.5" r="5"/><line x1="4.5" y1="4.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="4.5" x2="4.5" y2="8.5"/></svg>
                                OS notifications blocked — two steps to fix:
                              </span>
                              <ol style="margin:0;padding-left:16px;display:flex;flex-direction:column;gap:3px;color:var(--ink-2)">
                                <li>
                                  <strong>Browser</strong>: click the 🔒 icon in the address bar → Notifications → Allow
                                </li>
                                <li>
                                  <strong>macOS</strong>:
                                  <a href="x-apple.systempreferences:com.apple.preference.notifications" style="color:var(--accent);text-decoration:underline">
                                    Open System Settings → Notifications
                                  </a>
                                  → find your browser → enable Allow Notifications
                                </li>
                              </ol>
                            </span>
                          </template>
                          <!-- API not supported -->
                          <template x-if="osNotifPermission === 'unsupported'">
                            <span style="color:var(--ink-3)">OS notifications not supported in this browser</span>
                          </template>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </template>
