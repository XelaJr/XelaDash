<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0088cc" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="inner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="256,38 442,145 442,367 256,474 70,367 70,145"/>
    </clipPath>
  </defs>

  <!-- Background dark circle -->
  <circle cx="256" cy="256" r="248" fill="#080c14"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#0a1830" stroke-width="1"/>

  <!-- Outer hexagon ring -->
  <polygon points="256,38 442,145 442,367 256,474 70,367 70,145"
    fill="none" stroke="url(#glow)" stroke-width="2.5" filter="url(#neon)" opacity="0.8"/>

  <!-- Inner hex grid pattern -->
  <g opacity="0.12" stroke="#00d4ff" stroke-width="0.5" fill="none">
    <polygon points="256,100 370,166 370,298 256,364 142,298 142,166"/>
    <polygon points="256,140 340,186 340,278 256,324 172,278 172,186"/>
    <line x1="256" y1="100" x2="256" y2="364"/>
    <line x1="142" y1="166" x2="370" y2="298"/>
    <line x1="370" y1="166" x2="142" y2="298"/>
  </g>

  <!-- Inner filled hexagon -->
  <polygon points="256,140 340,186 340,278 256,324 172,278 172,186"
    fill="url(#inner)" stroke="url(#glow)" stroke-width="1.5" opacity="0.5"/>

  <!-- Central X mark (XelaDash) -->
  <g filter="url(#neonStrong)">
    <!-- The X -->
    <line x1="196" y1="186" x2="316" y2="316" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
    <line x1="316" y1="186" x2="196" y2="316" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
    <!-- Center diamond accent -->
    <polygon points="256,222 274,252 256,282 238,252" fill="#00d4ff" opacity="0.35"/>
  </g>

  <!-- Corner accent ticks on hexagon -->
  <g stroke="#00d4ff" stroke-width="2" opacity="0.6" filter="url(#neon)">
    <!-- Top -->
    <line x1="256" y1="38" x2="256" y2="58"/>
    <!-- Top-right -->
    <line x1="442" y1="145" x2="425" y2="155"/>
    <!-- Bottom-right -->
    <line x1="442" y1="367" x2="425" y2="357"/>
    <!-- Bottom -->
    <line x1="256" y1="474" x2="256" y2="454"/>
    <!-- Bottom-left -->
    <line x1="70" y1="367" x2="87" y2="357"/>
    <!-- Top-left -->
    <line x1="70" y1="145" x2="87" y2="155"/>
  </g>

  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="0.8"
    opacity="0.2" stroke-dasharray="8,12"/>

  <!-- Data dots on orbit -->
  <g fill="#00d4ff" filter="url(#neon)">
    <circle cx="456" cy="256" r="3" opacity="0.7"/>
    <circle cx="56" cy="256" r="3" opacity="0.7"/>
    <circle cx="256" cy="56" r="3" opacity="0.5"/>
    <circle cx="256" cy="456" r="3" opacity="0.5"/>
  </g>

  <!-- Scan lines (subtle) -->
  <g opacity="0.04" clip-path="url(#hexClip)">
    <line x1="70" y1="180" x2="442" y2="180" stroke="#00d4ff" stroke-width="1"/>
    <line x1="70" y1="220" x2="442" y2="220" stroke="#00d4ff" stroke-width="1"/>
    <line x1="70" y1="260" x2="442" y2="260" stroke="#00d4ff" stroke-width="1"/>
    <line x1="70" y1="300" x2="442" y2="300" stroke="#00d4ff" stroke-width="1"/>
    <line x1="70" y1="340" x2="442" y2="340" stroke="#00d4ff" stroke-width="1"/>
  </g>
</svg>
