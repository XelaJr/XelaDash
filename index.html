<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XelaDash</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- script extracted -->
  <!-- script extracted -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <!-- script extracted -->

  <!-- style extracted -->
</head>

<body x-data="app()" x-init="init()">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" :class="{ 'nav-icon-only': navWidth <= 56 }" :style="`width:${navWidth}px;min-width:${navWidth}px`">
    <div class="nav-resize-handle" :class="{ dragging: _navDragging }" @mousedown.prevent="startNavResize($event)"></div>
    <div class="brand">
      <div class="brand-mark" @click="if(navWidth <= 56) toggleNav()" :style="navWidth <= 56 ? 'cursor:pointer' : ''">
        <img src="/assets/logo.svg" width="28" height="28" alt="XelaDash" style="display:block" />
      </div>
      <span class="nav-text" style="display:flex;flex-direction:column;line-height:1">
        <span class="brand-name">XELADASH</span>
        <span style="font-size:9px;font-weight:400;color:var(--ink-3);letter-spacing:0.02em" x-text="status?.appVersion ? 'v'+status.appVersion : ''"></span>
      </span>
      <button class="nav-collapse-btn" @click="toggleNav()" :title="navWidth <= 56 ? 'Expandir sidebar' : 'Colapsar sidebar'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline :points="navWidth <= 56 ? '5,2 10,7 5,12' : '9,2 4,7 9,12'"/>
        </svg>
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-item" :class="{ active: view === 'sessions' }" @click="view='sessions';selectedSession=null">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <rect x="2" y="2" width="12" height="12"/>
            <line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="10" x2="8.5" y2="10"/>
          </svg>
        </span>
        <span class="nav-text">Sessions</span>
        <template x-if="activeSessions.length > 0">
          <span class="live-dot" title="Active session"></span>
        </template>
        <span class="nav-count" x-show="activeSessions.length === 0" x-text="totalSessions"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'plans' }" @click="view='plans';selectedSession=null;loadPlans()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <rect x="2" y="2" width="12" height="12"/>
            <line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="8" y2="12"/>
          </svg>
        </span>
        <span class="nav-text">Plans</span>
        <span class="nav-count" x-show="plans.length>0" x-text="plans.length"></span>
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-item" :class="{ active: view === 'agents' }" @click="view='agents';selectedSession=null;loadAgents();if(agentsTab==='marketplace'){loadAgentsMarketplace();loadAgentsMarketplaceSources();}">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <circle cx="8" cy="5" r="2.5"/>
            <path d="M3 13c0-2.76 2.24-5 5-5s5 2.24 5 5"/>
            <circle cx="12" cy="5" r="1.5" stroke-dasharray="2,1"/>
            <circle cx="4" cy="5" r="1.5" stroke-dasharray="2,1"/>
          </svg>
        </span>
        <span class="nav-text">Agents</span>
        <span class="nav-count" x-show="agents.length>0" x-text="agents.length"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'skills' }" @click="view='skills';selectedSession=null;loadTools();if(skillsTab==='marketplace'){loadMarketplace();}">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <path d="M10 2L6 9h4l-2 5L14 7h-4z"/>
          </svg>
        </span>
        <span class="nav-text">Skills</span>
        <span class="nav-count" x-show="toolSkills.length>0" x-text="toolSkills.length"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'commands' }" @click="view='commands';selectedSession=null;loadTools();if(cliTab==='marketplace'){loadCommandsMarketplace();loadCommandsMarketplaceSources();}">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <rect x="2" y="3" width="12" height="10"/>
            <polyline points="5,7 7,9 5,11"/><line x1="8" y1="11" x2="12" y2="11"/>
          </svg>
        </span>
        <span class="nav-text">Commands</span>
        <span class="nav-count" x-show="toolCommands.length>0" x-text="toolCommands.length"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'plugins' }" @click="view='plugins';selectedSession=null;loadPlugins();if(pluginsTab==='discover'){loadPluginsAvailable();loadPluginsMarketplaces();}">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2h4v3h2v2h-2v1h2l1 6H3l1-6h2V7H4V5h2V2z"/>
            <line x1="6" y1="5" x2="10" y2="5"/>
          </svg>
        </span>
        <span class="nav-text">Plugins</span>
        <span class="nav-count" x-show="pluginsInstalled.length>0" x-text="pluginsInstalled.length"></span>
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-item" :class="{ active: view === 'memory' }" @click="view='memory';selectedSession=null;loadMemory()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <path d="M3 2h7l3 3v9H3z"/><path d="M10 2v3h3"/>
            <line x1="6" y1="7" x2="10" y2="7"/><line x1="6" y1="10" x2="10" y2="10"/>
          </svg>
        </span>
        <span class="nav-text">Memory</span>
        <span class="nav-count" x-show="memoryFiles.length>0" x-text="memoryFiles.length"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'instructions' }" @click="view='instructions';selectedSession=null;loadConfig()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 2h10v12H3z"/><line x1="5.5" y1="5.5" x2="10.5" y2="5.5"/><line x1="5.5" y1="8" x2="10.5" y2="8"/><line x1="5.5" y1="10.5" x2="8.5" y2="10.5"/>
          </svg>
        </span>
        <span class="nav-text">Instructions</span>
      </div>
      <div class="nav-item" :class="{ active: view === 'permissions' }" @click="view='permissions';selectedSession=null;loadConfig()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="7" width="8" height="7" rx="1"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/>
          </svg>
        </span>
        <span class="nav-text">Permissions</span>
      </div>
      <div class="nav-item" :class="{ active: view === 'hooks' }" @click="view='hooks';selectedSession=null;loadConfig()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="10" r="1.5" fill="currentColor" stroke="none"/>
            <path d="M5 7.5a4.2 4.2 0 0 1 6 0"/>
            <path d="M2.5 5a8 8 0 0 1 11 0"/>
          </svg>
        </span>
        <span class="nav-text">Hooks</span>
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-item" :class="{ active: view === 'config' }" @click="view='config';selectedSession=null;loadConfig()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
            <rect x="6.5" y="6.5" width="3" height="3"/>
            <line x1="8" y1="1.5" x2="8" y2="5"/><line x1="8" y1="11" x2="8" y2="14.5"/>
            <line x1="1.5" y1="8" x2="5" y2="8"/><line x1="11" y1="8" x2="14.5" y2="8"/>
          </svg>
        </span>
        <span class="nav-text">Config</span>
      </div>
    </div>

    <template x-if="showInsights || showTemplates">
      <div>
        <div class="nav-divider"></div>
        <div class="nav-section-label" @click="widgetsOpen=!widgetsOpen;localStorage.setItem('cs:widgetsOpen',widgetsOpen)" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding-right:12px;user-select:none">
          Widgets
          <svg :style="widgetsOpen ? '' : 'transform:rotate(-90deg)'" style="transition:transform 0.15s" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,3 5,7 8,3"/></svg>
        </div>
        <div class="nav-section" x-show="widgetsOpen || navWidth <= 56">
          <div x-show="showInsights" class="nav-item nav-widget" :class="{ active: view === 'dashboard' }" @click="view='dashboard';selectedSession=null;loadStats();loadInsights()">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="8" width="3" height="6" rx="0.5"/>
                <rect x="6.5" y="5" width="3" height="9" rx="0.5"/>
                <rect x="11" y="2" width="3" height="12" rx="0.5"/>
              </svg>
            </span>
            <span class="nav-text">Analytics</span>
          </div>
          <div x-show="showTemplates" class="nav-item nav-widget" :class="{ active: view === 'templates' }" @click="view='templates';selectedSession=null;loadTemplates()">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke="currentColor">
                <rect x="2" y="2" width="12" height="12" rx="1"/>
                <line x1="5" y1="5" x2="11" y2="5"/>
                <line x1="5" y1="8" x2="11" y2="8"/>
                <line x1="5" y1="11" x2="8" y2="11"/>
              </svg>
            </span>
            <span class="nav-text">Prompts</span>
            <span class="nav-count" x-show="templates.length>0" x-text="templates.length"></span>
          </div>
        </div>
      </div>
    </template>

    <div class="nav-divider"></div>
    <div class="sidebar-footer">
      <!-- Key metrics -->
      <template x-if="insights">
        <div @click="view='dashboard';selectedSession=null;loadStats();loadInsights()" style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--rule);cursor:pointer;border-radius:4px;padding:6px 4px 10px;margin:-6px -4px 10px;transition:background 0.1s" @mouseover="$el.style.background='var(--canvas)'" @mouseout="$el.style.background='transparent'">
          <div class="sidebar-footer-row" style="justify-content:space-between">
            <span style="color:var(--ink-3)">Tokens</span>
            <span x-text="fmtTokensM(insights.totalTokens.input + insights.totalTokens.output + insights.totalTokens.cacheRead + insights.totalTokens.cacheCreate)"></span>
          </div>
          <div class="sidebar-footer-row" style="justify-content:space-between">
            <span style="color:var(--ink-3)">Total cost</span>
            <span x-text="fmtCost(insights.totalCost)"></span>
          </div>
          <div class="sidebar-footer-row" style="justify-content:space-between">
            <span style="color:var(--ink-3)">Cache saved</span>
            <span style="color:var(--green)" x-text="fmtCost(insights.totalSavings)"></span>
          </div>
          <div class="sidebar-footer-row" style="justify-content:space-between">
            <span style="color:var(--ink-3)">CO₂</span>
            <span x-text="fmtCarbon(insights.totalCarbon) || '—'"></span>
          </div>
          <div class="sidebar-footer-row" style="justify-content:flex-end;margin-top:2px">
            <span style="font-size:10px;color:var(--ink-3)">Insights →</span>
          </div>
        </div>
      </template>
      <!-- Version + last session -->
      <div class="sidebar-footer-row">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4.5"/><line x1="6" y1="3.5" x2="6" y2="6"/><line x1="6" y1="6" x2="8" y2="7.5"/></svg>
        <span x-text="status?.claudeVersion || '…'"></span>
      </div>
      <template x-if="sessions.length > 0">
        <div class="sidebar-footer-row" style="color:var(--ink-3)">
          Last: <span x-text="formatDate(sessions[0]?.modified)"></span>
        </div>
      </template>
      <div class="sidebar-footer-row" style="color:var(--ink-3)">
        Created by <a href="https://github.com/XelaJr" target="_blank" style="color:var(--ink-2);text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">XelaJr</a>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Project detail -->
    <template x-if="view === 'projects' && selectedProject && !selectedSession">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <!-- Header -->
        <div class="project-detail-header">
          <button class="btn btn-outline btn-sm" @click="selectedProject=null;view='dashboard'" style="flex-shrink:0">← Insights</button>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="shortProjectName(selectedProject.projectPath) || selectedProject.dirName"></div>
            <div style="font-size:10.5px;color:var(--ink-3);font-family:'SF Mono','Fira Code',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="selectedProject.projectPath"></div>
          </div>
          <!-- Stats chips -->
          <div style="display:flex;gap:10px;align-items:center;flex-shrink:0">
            <span style="font-size:11.5px;color:var(--ink-3)"><b x-text="selectedProject.sessionCount"></b> sessions</span>
            <template x-if="selectedProject.memoryCount > 0">
              <span style="font-size:11.5px;color:var(--ink-3)"><b x-text="selectedProject.memoryCount"></b> memories</span>
            </template>
            <template x-if="projectCost(selectedProject.dirName) !== null">
              <span style="font-size:11.5px;color:var(--ink-3)"><b x-text="fmtCost(projectCost(selectedProject.dirName))"></b> cost</span>
            </template>
            <template x-if="!selectedProject.diskExists">
              <span class="proj-badge missing">directory missing</span>
            </template>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tools-tabs" style="border-bottom:1px solid var(--rule)">
          <div class="tools-tab" :class="{active: projectTab==='sessions'}" @click="projectTab='sessions'">Sessions</div>
          <div class="tools-tab" :class="{active: projectTab==='memory'}" @click="projectTab='memory'">Memory <template x-if="projectMemory.length>0"><span class="nav-count" x-text="projectMemory.length"></span></template></div>
          <div class="tools-tab" :class="{active: projectTab==='claudemd'}" @click="projectTab='claudemd'">CLAUDE.md</div>
          <div class="tools-tab" :class="{active: projectTab==='git'}" @click="projectTab='git';loadProjectGitStatus()">Git <template x-if="projectGitStatus && projectGitStatus.files.length>0"><span class="nav-count" x-text="projectGitStatus.files.length"></span></template></div>
        </div>

        <!-- Tab: Sessions -->
        <template x-if="projectTab === 'sessions'">
          <div style="flex:1;overflow-y:auto;padding-top:6px;">
            <template x-if="projectSessionsLoading"><div class="loading"><div class="spinner"></div> Loading…</div></template>
            <template x-if="!projectSessionsLoading && projectSessions.length === 0">
              <div class="empty"><div class="empty-mark"></div>No sessions</div>
            </template>
            <template x-if="!projectSessionsLoading && projectSessions.length > 0">
              <div class="sessions-list" style="padding:0 20px">
                <template x-for="s in projectSessions" :key="s.sessionId">
                  <div class="session-row" @click="view='sessions';openSession(s)">
                    <div class="session-body">
                      <div class="session-prompt" x-text="s.firstPrompt || '(no prompt)'"></div>
                      <div class="session-lower">
                        <template x-if="s.gitBranch">
                          <div class="session-branch">
                            <div class="branch-square" :style="'background:' + branchColor(s.gitBranch)"></div>
                            <span x-text="s.gitBranch"></span>
                          </div>
                        </template>
                        <span class="session-msgs" x-text="s.messageCount + ' msgs'"></span>
                        <span class="session-msgs" x-text="formatDate(s.modified)"></span>
                        <template x-if="sessionCosts[s.sessionId]">
                          <span class="session-msgs" style="padding-left:8px;border-left:1px solid var(--rule);font-family:'SF Mono','Fira Code',monospace" x-text="fmtCost(sessionCosts[s.sessionId])"></span>
                        </template>
                      </div>
                    </div>
                    <div class="session-right">
                      <button class="session-resume-btn" :disabled="!s.resumable" :title="!s.resumable ? 'Session file deleted' : 'Copy resume command'" @click.stop="s.resumable && resumeSession(s.sessionId, 'proj-resume-'+s.sessionId, s.projectPath)" :id="'proj-resume-'+s.sessionId">Resume →</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>

        <!-- Tab: Memory -->
        <template x-if="projectTab === 'memory'">
          <div style="flex:1;overflow:hidden;display:flex;">
            <template x-if="projectMemoryLoading"><div class="loading"><div class="spinner"></div> Loading…</div></template>
            <template x-if="!projectMemoryLoading && projectMemory.length === 0">
              <div class="empty"><div class="empty-mark"></div>No memory files for this project</div>
            </template>
            <template x-if="!projectMemoryLoading && projectMemory.length > 0">
              <div style="display:flex;width:100%;overflow:hidden;">
                <div class="memory-sidebar" :style="'width:'+sidebarW+'px'">
                  <template x-for="f in projectMemory" :key="f.filename">
                    <div class="memory-row" :class="{active: projectMemorySelected?.filename===f.filename}"
                         @click="projectMemorySelected=f">
                      <div class="memory-row-name" x-text="f.name || f.filename"></div>
                      <div class="memory-row-desc" x-text="f.description || f.filename"></div>
                    </div>
                  </template>
                </div>
                <div class="resize-handle" @mousedown.prevent="startResize($event)"></div>
                <div class="memory-detail">
                  <template x-if="!projectMemorySelected">
                    <div class="memory-empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Select a memory file</div>
                  </template>
                  <template x-if="projectMemorySelected">
                    <div>
                      <div class="memory-detail-title" x-text="projectMemorySelected.name || projectMemorySelected.filename"></div>
                      <div class="memory-detail-meta">
                        <span :class="'type-pill type-'+(projectMemorySelected.type||'unknown')" x-text="projectMemorySelected.type||'unknown'"></span>
                        <span class="memory-filename" x-text="projectMemorySelected.filename"></span>
                      </div>
                      <template x-if="projectMemorySelected.description"><div class="memory-desc-intro" x-text="projectMemorySelected.description"></div></template>
                      <div class="memory-content md-content" x-html="renderMd(projectMemorySelected.content)"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Tab: CLAUDE.md -->
        <template x-if="projectTab === 'claudemd'">
          <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
            <template x-if="projectClaudeMdLoading"><div class="loading"><div class="spinner"></div> Loading…</div></template>
            <template x-if="!projectClaudeMdLoading && projectClaudeMd">
              <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
                <!-- File selector + actions -->
                <div style="display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--rule);flex-wrap:wrap">
                  <template x-if="projectClaudeMd.files.length === 0">
                    <span style="font-size:12px;color:var(--ink-3)">No CLAUDE.md found in this project</span>
                  </template>
                  <template x-if="projectClaudeMd.files.length > 0">
                    <select class="filter-select" x-model.number="projectClaudeMdEdit.fileIdx" @change="projectClaudeMdEdit.active=false;projectClaudeMdEdit.msg=''">
                      <template x-for="(f, i) in projectClaudeMd.files" :key="f.filePath">
                        <option :value="i" x-text="f.label"></option>
                      </template>
                    </select>
                  </template>
                  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
                    <template x-if="projectClaudeMdEdit.msg">
                      <span :class="projectClaudeMdEdit.msg==='Saved'?'save-msg':'err-msg'" x-text="projectClaudeMdEdit.msg"></span>
                    </template>
                    <template x-if="projectClaudeMd.files.length > 0 && !projectClaudeMdEdit.active">
                      <button class="btn btn-outline btn-sm" @click="projectClaudeMdEdit.active=true;projectClaudeMdEdit.draft=projectClaudeMd.files[projectClaudeMdEdit.fileIdx]?.content||'';projectClaudeMdEdit.msg=''">Editar</button>
                    </template>
                    <template x-if="projectClaudeMdEdit.active">
                      <button class="btn btn-outline btn-sm" @click="projectClaudeMdEdit.active=false">Cancelar</button>
                    </template>
                    <template x-if="projectClaudeMdEdit.active">
                      <button class="btn btn-primary btn-sm" @click="saveProjectClaudeMd()" :disabled="projectClaudeMdEdit.saving" x-text="projectClaudeMdEdit.saving?'Guardando…':'Guardar'"></button>
                    </template>
                  </div>
                </div>
                <!-- Content -->
                <div style="flex:1;overflow:hidden;">
                  <template x-if="projectClaudeMd.files.length > 0 && !projectClaudeMdEdit.active">
                    <div class="proj-md-content md-content" x-html="renderMd(projectClaudeMd.files[projectClaudeMdEdit.fileIdx]?.content||'')"></div>
                  </template>
                  <template x-if="projectClaudeMdEdit.active">
                    <textarea class="edit-textarea" style="width:100%;height:100%;resize:none;border:none;outline:none;padding:20px;font-family:'SF Mono','Fira Code',monospace;font-size:12.5px;line-height:1.7;background:var(--white);box-sizing:border-box" x-model="projectClaudeMdEdit.draft"></textarea>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Tab: Git -->
        <template x-if="projectTab === 'git'">
          <div style="flex:1;overflow-y:auto;">
            <template x-if="projectGitLoading"><div class="loading"><div class="spinner"></div> Loading…</div></template>
            <template x-if="!projectGitLoading && projectGitStatus">
              <div style="padding:16px 20px;">
                <!-- Not a git repo -->
                <template x-if="!projectGitStatus.isRepo">
                  <div class="empty"><div class="empty-mark"></div>Not a git repository</div>
                </template>
                <!-- Is a git repo -->
                <template x-if="projectGitStatus.isRepo">
                  <div>
                    <!-- Branch + refresh -->
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                      <div style="display:flex;align-items:center;gap:6px;">
                        <div class="branch-square" :style="'background:' + branchColor(projectGitStatus.branch)"></div>
                        <span style="font-size:13px;font-weight:600;" x-text="projectGitStatus.branch"></span>
                      </div>
                      <button class="btn btn-outline btn-sm" style="margin-left:auto" @click="loadProjectGitStatus()">Refresh</button>
                    </div>
                    <!-- Working tree files -->
                    <template x-if="projectGitStatus.files.length === 0">
                      <div style="font-size:12.5px;color:var(--ink-3);padding:8px 0;">Clean working tree</div>
                    </template>
                    <template x-if="projectGitStatus.files.length > 0">
                      <div style="margin-bottom:20px;">
                        <div style="font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;" x-text="projectGitStatus.files.length + ' changed file' + (projectGitStatus.files.length===1?'':'s')"></div>
                        <div style="display:flex;flex-direction:column;gap:3px;">
                          <template x-for="f in projectGitStatus.files" :key="f.path">
                            <div style="display:flex;align-items:baseline;gap:8px;font-size:12.5px;padding:4px 8px;border-radius:4px;background:var(--surface);">
                              <span style="font-family:'SF Mono','Fira Code',monospace;font-size:11px;font-weight:700;flex-shrink:0;min-width:18px;"
                                    :style="f.status==='M'?'color:#ffd000':f.status==='A'?'color:#00ff88':f.status==='D'?'color:var(--red)':f.status==='??'?'color:var(--ink-3)':'color:var(--ink-2)'"
                                    x-text="f.status"></span>
                              <span style="font-family:'SF Mono','Fira Code',monospace;color:var(--ink-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="f.path"></span>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                    <!-- Recent commits -->
                    <template x-if="projectGitStatus.recentCommits && projectGitStatus.recentCommits.length > 0">
                      <div>
                        <div style="font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Recent commits</div>
                        <div style="display:flex;flex-direction:column;gap:3px;">
                          <template x-for="c in projectGitStatus.recentCommits" :key="c.hash">
                            <div style="display:flex;align-items:baseline;gap:8px;font-size:12.5px;padding:4px 8px;border-radius:4px;">
                              <span style="font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:var(--ink-3);flex-shrink:0;" x-text="c.hash"></span>
                              <span style="color:var(--ink-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="c.message"></span>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>

      </div>
    </template>

    <!-- Dashboard (home) — disabled -->
    <template x-if="view === 'dashboard' && !selectedSession">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <div class="topbar">
          <span class="topbar-title">Insights</span>
          <span style="font-size:11px;color:var(--ink-3)" x-text="formatDate(new Date().toISOString())"></span>
        </div>
        <span class="section-sub">Token usage, cost &amp; activity heatmap</span>
        <div class="content">
          <div style="max-width:1200px;display:flex;gap:20px;align-items:flex-start">

            <!-- Left column: all dashboard content -->
            <div style="flex:1;min-width:0">

            <!-- Budget alert banner -->
            <template x-if="budgetStatus() && budgetStatus().status !== 'ok' && budgetAlertDismissed !== new Date().toISOString().slice(0,7)">
              <div class="budget-banner" :class="budgetStatus().status">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>
                  <template x-if="budgetStatus().status === 'over'">
                    <strong>Budget exceeded</strong>
                  </template>
                  <template x-if="budgetStatus().status === 'warn'">
                    <strong>Budget warning</strong>
                  </template>
                  — This month: <span x-text="fmtCost(budgetStatus().monthCost)"></span> of <span x-text="fmtCost(budgetMonthly)"></span> limit (<span x-text="Math.round(budgetStatus().pct*100)+'%'"></span>)
                </span>
                <button class="budget-banner-close" @click="budgetAlertDismissed = new Date().toISOString().slice(0,7); localStorage.setItem('cs:budgetAlertDismissed', budgetAlertDismissed)" title="Dismiss until next month">×</button>
              </div>
            </template>

            <!-- Row 1: Stats -->
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
              <div class="db-card">
                <div class="db-card-label">Total tokens</div>
                <div class="db-card-value" x-text="insights ? fmtTokensM(insights.totalTokens.input + insights.totalTokens.output + insights.totalTokens.cacheRead + insights.totalTokens.cacheCreate) : '—'"></div>
                <div class="db-card-sub" x-text="insights ? fmtTokensM(insights.totalTokens.output) + ' output · ' + fmtTokensM(insights.totalTokens.input) + ' input' : ''"></div>
              </div>
              <div class="db-card">
                <div class="db-card-label" style="display:flex;align-items:center;gap:5px">
                  Total cost
                  <span class="tooltip-wrap" @click.stop>
                    <i class="tooltip-icon">i</i>
                    <span class="tooltip-box">
                      <strong>Cost calculation</strong><br><br>
                      Based on Anthropic's published API pricing (USD per million tokens):<br><br>
                      <table style="border-collapse:collapse;width:100%;font-size:11px">
                        <tr style="color:var(--ink-3)"><td></td><td style="text-align:right;padding-right:8px">Input</td><td style="text-align:right;padding-right:8px">Output</td><td style="text-align:right;padding-right:8px">Cache write</td><td style="text-align:right">Cache read</td></tr>
                        <tr><td style="padding-right:8px">Opus</td><td style="text-align:right;padding-right:8px">$15</td><td style="text-align:right;padding-right:8px">$75</td><td style="text-align:right;padding-right:8px">$18.75</td><td style="text-align:right">$1.50</td></tr>
                        <tr><td style="padding-right:8px">Sonnet</td><td style="text-align:right;padding-right:8px">$3</td><td style="text-align:right;padding-right:8px">$15</td><td style="text-align:right;padding-right:8px">$3.75</td><td style="text-align:right">$0.30</td></tr>
                        <tr><td style="padding-right:8px">Haiku</td><td style="text-align:right;padding-right:8px">$0.80</td><td style="text-align:right;padding-right:8px">$4</td><td style="text-align:right;padding-right:8px">$1.00</td><td style="text-align:right">$0.08</td></tr>
                      </table><br>
                      Cost is summed across all sessions by reading token usage from each JSONL file. Sessions with no token data are excluded.
                    </span>
                  </span>
                </div>
                <div class="db-card-value" x-text="insights ? fmtCost(insights.totalCost) : '—'"></div>
                <div class="db-card-sub">all time</div>
              </div>
              <div class="db-card">
                <div class="db-card-label" style="display:flex;align-items:center;gap:5px">
                  Cache savings
                  <span class="tooltip-wrap" @click.stop>
                    <i class="tooltip-icon">i</i>
                    <span class="tooltip-box">
                      <strong>How cache savings are calculated</strong><br><br>
                      When Claude reuses a prompt prefix it has seen before, those tokens are billed at the cheaper <em>cache read</em> rate instead of the full input rate.<br><br>
                      <strong>Savings per token = input price − cache read price:</strong><br>
                      Opus: $15 − $1.50 = <strong>$13.50</strong>/M tokens<br>
                      Sonnet: $3 − $0.30 = <strong>$2.70</strong>/M tokens<br>
                      Haiku: $0.80 − $0.08 = <strong>$0.72</strong>/M tokens<br><br>
                      Savings shown here are the cumulative total across all sessions where cache hits were recorded.
                    </span>
                  </span>
                </div>
                <div class="db-card-value" style="color:var(--green)" x-text="insights ? fmtCost(insights.totalSavings) : '—'"></div>
                <div class="db-card-sub">money saved via prompt cache</div>
              </div>
              <div class="db-card">
                <div class="db-card-label" style="display:flex;align-items:center;gap:5px">
                  CO₂ footprint
                  <span class="tooltip-wrap" @click.stop>
                    <i class="tooltip-icon">i</i>
                    <span class="tooltip-box">
                      <template x-if="insights?.totalCarbon > 100">
                        <span style="display:block;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--rule)">
                          <strong>What does this equal?</strong><br>
                          <span style="display:flex;flex-direction:column;gap:3px;margin-top:5px">
                            <span style="display:flex;align-items:center;gap:5px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3v-5l2-5h14l2 5v5h-2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M5 12h14"/></svg><span x-text="carbonEquivs(insights.totalCarbon)?.car"></span></span>
                            <span style="display:flex;align-items:center;gap:5px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg><span x-text="carbonEquivs(insights.totalCarbon)?.flights"></span></span>
                            <span style="display:flex;align-items:center;gap:5px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-7"/><path d="M9 15l3-3 3 3"/><path d="M7 12l5-5 5 5"/><path d="M5 9l7-7 7 7"/></svg><span x-text="carbonEquivs(insights.totalCarbon)?.trees"></span></span>
                            <span style="display:flex;align-items:center;gap:5px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h16"/><path d="M4 12h16"/><path d="M4 16h16"/><path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg><span x-text="carbonEquivs(insights.totalCarbon)?.burgers"></span></span>
                            <span style="display:flex;align-items:center;gap:5px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 21V12h6v9"/></svg><span x-text="carbonEquivs(insights.totalCarbon)?.electricity"></span></span>
                          </span>
                        </span>
                      </template>
                      <strong>Calculation methodology</strong><br>
                      Based on <a href="https://arxiv.org/abs/2311.16863" target="_blank" style="color:var(--blue)">Luccioni et al. (2023)</a> + public scaling estimates.<br><br>
                      <strong>Energy per model (per million output tokens):</strong><br>
                      Opus ≈ 10 Wh · Sonnet ≈ 3 Wh · Haiku ≈ 0.8 Wh<br><br>
                      Input tokens count 30% and cache-read tokens 5% relative to output tokens.<br><br>
                      <strong>Carbon intensity:</strong> 300 gCO₂e/kWh (global average grid).<br><br>
                      Approximate estimate. Does not reflect Anthropic's renewable energy use or server region.
                    </span>
                  </span>
                </div>
                <div class="db-card-value" style="color:var(--green)" x-text="insights?.totalCarbon ? (fmtCarbon(insights.totalCarbon)?.replace(' CO₂','') || '—') : '—'"></div>
                <div class="db-card-sub">all time</div>
                <template x-if="insights?.totalCarbon > 100">
                  <div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">
                    <div style="font-size:10px;color:var(--ink-3);display:flex;align-items:center;gap:5px">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M5 17H3v-5l2-5h14l2 5v5h-2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M5 12h14"/></svg>
                      <span x-text="'≈ ' + carbonEquivs(insights.totalCarbon)?.car"></span>
                    </div>
                    <div style="font-size:10px;color:var(--ink-3);display:flex;align-items:center;gap:5px">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M12 22v-7"/><path d="M9 15l3-3 3 3"/><path d="M7 12l5-5 5 5"/><path d="M5 9l7-7 7 7"/></svg>
                      <span x-text="'≈ ' + carbonEquivs(insights.totalCarbon)?.trees"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div><!-- /stats grid -->

            <!-- Row 2: Heatmap -->
            <template x-if="stats">
              <div class="heatmap-wrap">
                <div class="heatmap-section-title">Contribution heatmap</div>
                <div class="heatmap-months" x-html="heatmapMonths()"></div>
                <div class="heatmap-grid" x-html="heatmapCells()"></div>
                <div class="heatmap-legend">
                  <span>Less</span>
                  <div class="legend-cell" style="background:var(--canvas);border:1px solid var(--rule)"></div>
                  <div class="legend-cell" style="background:rgba(0, 212, 255, 0.15)"></div>
                  <div class="legend-cell" style="background:rgba(0, 212, 255, 0.35)"></div>
                  <div class="legend-cell" style="background:rgba(0, 212, 255, 0.55)"></div>
                  <div class="legend-cell" style="background:rgba(0, 212, 255, 0.8)"></div>
                  <span>More</span>
                </div>
              </div>
            </template>

            <!-- Usage Windows -->
            <template x-if="usageWindows">
            <div style="margin-bottom:20px">
              <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px">Usage Windows</div>

              <!-- Usage stats -->
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
                <!-- Current 5h window -->
                <div class="db-card">
                  <div class="db-card-label">Current 5h window</div>
                  <div class="db-card-value" x-text="'$' + (usageWindows.currentWindow.cost || 0).toFixed(2)"></div>
                  <div style="font-size:18px;font-weight:600;color:var(--ink-2);margin-top:2px" x-text="((usageWindows.currentWindow.tokens.input + usageWindows.currentWindow.tokens.output) / 1e6).toFixed(2) + 'M tokens'"></div>
                  <div class="db-card-sub" style="margin-top:6px">
                    <span x-text="usageWindows.currentWindow.sessions"></span> sessions ·
                    <span style="color:var(--ink-3)" x-text="windowResetLabel()"></span>
                  </div>
                </div>

                <!-- Today -->
                <div class="db-card">
                  <div class="db-card-label">Today</div>
                  <div class="db-card-value" x-text="'$' + (usageWindows.today.cost || 0).toFixed(2)"></div>
                  <div style="font-size:18px;font-weight:600;color:var(--ink-2);margin-top:2px" x-text="((usageWindows.today.tokens.input + usageWindows.today.tokens.output) / 1e6).toFixed(2) + 'M tokens'"></div>
                  <div class="db-card-sub" style="margin-top:6px">
                    <span x-text="usageWindows.today.sessions"></span> sessions ·
                    in: <span x-text="(usageWindows.today.tokens.input / 1e6).toFixed(1) + 'M'"></span> ·
                    out: <span x-text="(usageWindows.today.tokens.output / 1e6).toFixed(1) + 'M'"></span>
                  </div>
                </div>

                <!-- This week -->
                <div class="db-card">
                  <div class="db-card-label">This week</div>
                  <div class="db-card-value" x-text="'$' + (usageWindows.currentWeek.cost || 0).toFixed(2)"></div>
                  <div style="font-size:18px;font-weight:600;color:var(--ink-2);margin-top:2px" x-text="((usageWindows.currentWeek.tokens.input + usageWindows.currentWeek.tokens.output) / 1e6).toFixed(2) + 'M tokens'"></div>
                  <div class="db-card-sub" style="margin-top:6px">
                    <span x-text="usageWindows.currentWeek.sessions"></span> sessions ·
                    $<span x-text="(usageWindows.currentWeek.avgDaily || 0).toFixed(2)"></span>/day avg
                    <template x-if="usageWindows.currentWeek.deltaVsPrev !== null && usageWindows.currentWeek.deltaVsPrev !== undefined">
                      <span :style="usageWindows.currentWeek.deltaVsPrev > 0 ? 'color:var(--red)' : 'color:var(--green)'"
                        x-text="(usageWindows.currentWeek.deltaVsPrev > 0 ? ' +' : ' ') + usageWindows.currentWeek.deltaVsPrev + '%'">
                      </span>
                    </template>
                  </div>
                </div>
              </div>

              <!-- 5h window bars -->
              <div style="background:var(--surface-2);border-radius:8px;padding:14px 16px;margin-bottom:12px">
                <div style="font-size:11px;font-weight:600;color:var(--ink-2);margin-bottom:10px">5-hour windows · last 7 days</div>
                <div style="display:flex;gap:1px;align-items:flex-end;height:60px">
                  <template x-for="bar in windowBars()" :key="bar.start">
                    <div :style="'flex:1;min-width:0;height:' + bar.pct + '%;border-radius:2px 2px 0 0;transition:height .3s;cursor:default;' + (bar.isCurrent ? 'background:var(--blue,#4a9eff)' : bar.cost > 0 ? 'background:var(--ink-3)' : 'background:var(--surface-3)')"
                      :title="bar.label + ': $' + bar.cost.toFixed(2) + ' (' + bar.sessions + ' sessions)'">
                    </div>
                  </template>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:4px">
                  <span style="font-size:9px;color:var(--ink-3)">7 days ago</span>
                  <span style="font-size:9px;color:var(--ink-3)">now</span>
                </div>
              </div>

              <!-- Weekly bars -->
              <div style="background:var(--surface-2);border-radius:8px;padding:14px 16px">
                <div style="font-size:11px;font-weight:600;color:var(--ink-2);margin-bottom:10px">Weekly usage · last 5 weeks</div>
                <div style="display:flex;gap:8px;align-items:flex-end;height:80px">
                  <template x-for="bar in weekBars()" :key="bar.weekStart">
                    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
                      <div style="font-size:10px;color:var(--ink-2)" x-text="'$' + bar.cost.toFixed(2)"></div>
                      <div :style="'width:100%;border-radius:3px;min-height:2px;transition:height .3s;height:' + bar.pct + '%;' + (bar.isCurrent ? 'background:var(--blue,#4a9eff)' : 'background:var(--ink-3)')"></div>
                      <div style="font-size:9px;color:var(--ink-3)" x-text="bar.weekLabel"></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
            </template>

            <!-- Row 4: Insights -->
            <template x-if="insightsLoading">
              <div class="loading"><div class="spinner"></div> Loading insights…</div>
            </template>
            <template x-if="insights && !insightsLoading">
              <div>
                <!-- Daily cost chart + Model costs -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
                  <div class="insight-section" style="margin-bottom:0">
                    <div class="insight-section-title">Cost last 30 days</div>
                    <div class="daily-chart">
                      <template x-for="bar in insightsDailyBars()" :key="bar.date">
                        <div class="daily-bar" :style="'height:'+bar.pct+'%'" :title="bar.date+': '+fmtCost(bar.cost)"></div>
                      </template>
                    </div>
                  </div>
                  <template x-if="insights.byModel && insights.byModel.length > 0">
                    <div class="insight-section" style="margin-bottom:0">
                      <div class="insight-section-title">Cost by model</div>
                      <template x-for="m in insights.byModel" :key="m.model">
                        <div class="cost-bar-row">
                          <span class="cost-bar-label" x-text="shortModelName(m.model)"></span>
                          <div class="cost-bar-track">
                            <div class="cost-bar-fill" :style="'width:'+(m.cost/insights.byModel[0].cost*100)+'%'"></div>
                          </div>
                          <span class="cost-bar-val" x-text="fmtCost(m.cost)"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>

                <!-- Latest session -->
                <template x-if="sessions.length > 0">
                  <div class="db-latest" @click="openSession(sessions[0])" style="margin-bottom:16px">
                    <div class="db-latest-label">Latest session</div>
                    <div class="db-latest-prompt" x-text="sessions[0].firstPrompt || '(no prompt)'"></div>
                    <div class="db-latest-meta">
                      <template x-if="sessions[0].gitBranch">
                        <span style="display:flex;align-items:center;gap:5px">
                          <div class="branch-square" :style="'background:' + branchColor(sessions[0].gitBranch)"></div>
                          <span x-text="sessions[0].gitBranch"></span>
                        </span>
                      </template>
                      <span x-text="formatDate(sessions[0].modified)"></span>
                      <span x-text="sessions[0].messageCount + ' msgs'"></span>
                      <button class="btn btn-primary btn-sm" style="margin-left:auto" :id="'resume-db'" :disabled="!sessions[0].resumable" :title="!sessions[0].resumable ? 'Session file deleted — cannot resume' : 'Copy command to resume this session'" @click.stop="sessions[0].resumable && resumeSession(sessions[0].sessionId,'resume-db', sessions[0].projectPath)">Resume →</button>
                    </div>
                  </div>
                </template>

                <!-- Top sessions -->
                <template x-if="insights.topSessions && insights.topSessions.length > 0">
                  <div class="insight-section">
                    <div class="insight-section-title">Most expensive sessions</div>
                    <template x-for="(s, si) in insights.topSessions.slice(0,10)" :key="s.sessionId">
                      <div class="top-session-row" @click="openSessionById(s.sessionId, s.projectDir)" style="position:relative">
                        <div class="top-session-costbar" :style="{ width: Math.round(s.cost / insights.topSessions[0].cost * 100) + '%' }"></div>
                        <span class="top-session-rank" :class="si===0?'rank-1':si===1?'rank-2':si===2?'rank-3':'rank-rest'" x-text="si===0?'🔥':si===1?'2nd':si===2?'3rd':(si+1)+'th'"></span>
                        <span class="top-session-cost" x-text="fmtCost(s.cost)"></span>
                        <span class="top-session-prompt" x-text="s.firstPrompt || '(no prompt)'"></span>
                        <span class="top-session-meta" x-text="shortModelName(s.model)"></span>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            </div><!-- /left column -->

            <!-- Right column: Projects -->
            <div style="width:240px;min-width:240px;background:var(--white);border:1px solid var(--rule);border-radius:6px;overflow:hidden;position:sticky;top:0">
              <div style="padding:12px 14px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--rule)">Projects</div>
              <template x-if="projects.length === 0">
                <div style="padding:16px 14px;font-size:12px;color:var(--ink-3)">No projects</div>
              </template>
              <template x-for="proj in projects" :key="proj.dirName">
                <div @click="openProject(proj)" style="padding:9px 14px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.1s" @mouseenter="$el.style.background='var(--canvas)'" @mouseleave="$el.style.background=''">
                  <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:2px">
                    <span style="font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1" x-text="shortProjectName(proj.projectPath) || proj.dirName"></span>
                    <template x-if="!proj.diskExists">
                      <span style="font-size:9px;color:var(--red);flex-shrink:0">missing</span>
                    </template>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-3)">
                    <span x-text="proj.sessionCount + ' sessions'"></span>
                    <template x-if="projectCost(proj.dirName) !== null">
                      <span x-text="fmtCost(projectCost(proj.dirName))" style="font-family:'SF Mono','Fira Code',monospace"></span>
                    </template>
                  </div>
                  <template x-if="projectCost(proj.dirName) !== null && insights?.byProject?.length">
                    <div style="margin-top:5px;height:3px;background:var(--canvas);border-radius:2px;overflow:hidden">
                      <div style="height:100%;background:var(--blue);border-radius:2px;transition:width 0.3s" :style="{ width: Math.round(projectCost(proj.dirName) / insights.byProject[0].cost * 100) + '%' }"></div>
                    </div>
                  </template>
                  <div style="font-size:10.5px;color:var(--ink-4);margin-top:1px" x-text="proj.lastActive ? formatDate(proj.lastActive) : ''"></div>
                </div>
              </template>
            </div><!-- /right column -->

          </div><!-- /two-col layout -->
        </div>
      </div>
    </template>

    <!-- Sessions view (tabs: List / Search / History) -->
    <template x-if="view === 'sessions' && !selectedSession">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <div class="topbar" style="flex-direction:column;gap:0;padding:0">
          <div class="tools-tabs" style="width:100%">
            <div class="tools-tab" :class="{active: sessionsTab==='list'}" @click="sessionsTab='list'">Sessions</div>
            <div class="tools-tab" :class="{active: sessionsTab==='files'}" @click="sessionsTab='files'; loadRecentFiles()">Files</div>
            <div class="tools-tab" :class="{active: sessionsTab==='timeline'}" @click="sessionsTab='timeline'; loadSessions()">Timeline</div>
            <div class="tools-tab" :class="{active: sessionsTab==='history'}" @click="sessionsTab='history'; loadHistory()">History</div>
          </div>
          <!-- List filters -->
          <div x-show="sessionsTab==='list'" style="display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:1px solid var(--rule);width:100%;flex-wrap:wrap">
            <input class="search-input" type="text" placeholder="Filter sessions…"
              x-model="filterText"
              @input.debounce.350ms="loadSessions(); if(filterText.length > 1){ searchQuery=filterText; searchProject=filterProject; doSearch() } else { searchResults=[] }"
              style="flex:1;max-width:380px" />
            <select class="filter-select" x-model="filterProject" x-init="$nextTick(()=>{ $el.value = filterProject })" @change="loadSessions(); loadBranches()">
              <option value="">All projects</option>
              <template x-for="p in projects" :key="p.dirName"><option :value="p.dirName" x-text="shortProjectName(p.projectPath)"></option></template>
            </select>
            <select class="filter-select" x-model="filterBranch" x-init="$nextTick(()=>{ $el.value = filterBranch })" @change="loadSessions()">
              <option value="">All branches</option>
              <template x-for="b in branches" :key="b"><option :value="b" x-text="b"></option></template>
            </select>
            <input class="filter-select" type="date" x-model="filterFrom" @change="loadSessions()" style="width:128px" />
            <input class="filter-select" type="date" x-model="filterTo" @change="loadSessions()" style="width:128px" />
            <template x-if="filterFrom || filterTo || filterBranch">
              <button class="btn btn-outline btn-sm" @click="filterFrom='';filterTo='';filterBranch='';loadSessions()">Clear</button>
            </template>
            <span style="margin-left:auto;font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums" x-text="sessions.length + ' sessions'"></span>
          </div>
          <!-- Files filters -->
          <div x-show="sessionsTab==='files'" style="display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:1px solid var(--rule);width:100%;flex-wrap:wrap">
            <div style="position:relative;flex:1;max-width:480px">
              <input class="search-input" type="text" placeholder="Search by file path… regex supported"
                x-model="filesQuery"
                @input="filesAutocomplete()"
                @keydown.arrow-down.prevent="filesSuggestIdx = Math.min(filesSuggestIdx + 1, filesSuggestions.length - 1)"
                @keydown.arrow-up.prevent="filesSuggestIdx = Math.max(filesSuggestIdx - 1, 0)"
                @keydown.enter.prevent="filesSuggestIdx >= 0 ? selectFilesSuggestion(filesSuggestions[filesSuggestIdx]) : searchFiles(); filesSuggestions = []"
                @keydown.escape="filesSuggestions = []"
                @blur.debounce.150ms="filesSuggestions = []"
                style="width:100%" />
              <template x-if="filesSuggestions.length > 0">
                <div style="position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--white);border:1px solid var(--rule);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:200;max-height:260px;overflow-y:auto">
                  <template x-for="(sug, i) in filesSuggestions" :key="sug.filePath">
                    <div @mousedown.prevent="selectFilesSuggestion(sug)"
                      class="suggest-item"
                      style="padding:6px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--rule)"
                      :style="i === filesSuggestIdx ? 'background:var(--canvas)' : ''">
                      <span style="font-size:10px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0"
                        :style="sug.tool==='Write' ? 'background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)' : sug.tool==='Edit' ? 'background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)' : 'background:var(--bg-2);color:var(--ink-3)'"
                        x-text="sug.tool"></span>
                      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)" x-text="sug.filePath"></span>
                      <span style="font-size:10.5px;color:var(--ink-3);flex-shrink:0" x-text="'×' + sug.sessionCount"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
            <span style="font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums" x-show="filesResults.length > 0" x-text="filesResults.length + ' results'"></span>
          </div>
          <!-- Timeline filters -->
          <div x-show="sessionsTab==='timeline'" style="display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:1px solid var(--rule);width:100%;flex-wrap:wrap">
            <select class="filter-select" x-model="filterProject" @change="loadSessions(); loadBranches()">
              <option value="">All projects</option>
              <template x-for="p in projects" :key="p.dirName"><option :value="p.dirName" x-text="shortProjectName(p.projectPath)"></option></template>
            </select>
            <select class="filter-select" x-model="filterBranch" @change="loadSessions()">
              <option value="">All branches</option>
              <template x-for="b in branches" :key="b"><option :value="b" x-text="b"></option></template>
            </select>
            <template x-if="filterBranch || filterProject">
              <button class="btn btn-outline btn-sm" @click="filterBranch='';filterProject='';loadSessions()">Clear</button>
            </template>
            <span style="margin-left:auto;font-size:11px;color:var(--ink-3)" x-text="sessions.length + ' sessions'"></span>
          </div>
          <!-- History filters -->
          <div x-show="sessionsTab==='history'" style="display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:1px solid var(--rule);width:100%;flex-wrap:wrap">
            <input class="search-input" type="text" placeholder="Filter history…"
              x-model="historySearch" @input.debounce.300ms="historyEntries = []; loadHistory()" style="flex:1;max-width:380px" />
            <select class="filter-select" x-model="historyProject" @change="historyEntries = []; loadHistory()">
              <option value="">All projects</option>
              <template x-for="p in projects" :key="p.dirName"><option :value="p.projectPath" x-text="shortProjectName(p.projectPath)"></option></template>
            </select>
            <span style="margin-left:auto;font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums" x-text="historyEntries.length + ' entries'"></span>
          </div>
        </div>
        <span class="section-sub" x-text="sessionsTab==='list' ? 'All Claude Code conversations — older sessions without content are hidden (Claude Code may delete them to free space)' : sessionsTab==='files' ? 'Search sessions by files Claude touched — Write, Edit, Read operations across all conversations' : sessionsTab==='timeline' ? 'Visual timeline of sessions by branch and project' : 'Chronological log of every session opened'"></span>

        <div class="content" style="padding:0;overflow:hidden;display:flex;flex-direction:column;min-height:0">
          <!-- TAB: List -->
          <template x-if="sessionsTab === 'list'">
            <!-- Split layout when searching, single column otherwise -->
            <div :style="filterText.length > 1 ? 'display:flex;gap:0;flex:1;min-height:0;overflow:hidden' : 'flex:1;overflow-y:auto'">

              <!-- Left: session title matches -->
              <div :style="filterText.length > 1 ? 'flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;border-right:1px solid var(--rule);padding:8px 24px' : 'overflow-x:hidden;padding:0 24px'">
                <template x-if="loadingSessions"><div class="loading"><div class="spinner"></div> Loading…</div></template>
                <template x-if="!loadingSessions && sessions.length === 0">
                  <div class="empty"><div class="empty-mark"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg></div><div>No sessions found</div></div>
                </template>
                <template x-if="!loadingSessions && sessions.length > 0">
                  <div>
                    <!-- LIVE section -->
                    <template x-if="activeSessions.length > 0 && filterText.length === 0">
                      <div>
                        <div class="group-header" style="display:flex;align-items:center;gap:8px">
                          <span class="live-dot"></span>
                          <span>Live</span>
                        </div>
                        <template x-for="s in activeSessions" :key="s.sessionId">
                          <div class="live-session-row" @click="openSession(s)">
                            <div class="session-body">
                              <div class="session-prompt" x-text="s.firstPrompt || s.sessionId"></div>
                              <div class="session-lower">
                                <template x-if="s.gitBranch">
                                  <div class="session-branch">
                                    <div class="branch-square" :style="'background:' + branchColor(s.gitBranch)"></div>
                                    <span x-text="s.gitBranch"></span>
                                  </div>
                                </template>
                                <span class="session-msgs" x-text="shortProjectName(s.projectPath) || s.projectDir"></span>
                              </div>
                            </div>
                            <span style="font-size:10px;font-weight:700;color:var(--red);letter-spacing:0.08em;margin-left:auto;flex-shrink:0">LIVE</span>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="filterText.length > 1">
                      <div class="group-header" style="display:flex;align-items:center;gap:6px">
                        Sessions
                        <span style="font-size:10px;color:var(--ink-3);font-weight:400;text-transform:none;letter-spacing:0" x-text="sessions.length + ' matching'"></span>
                      </div>
                    </template>
                    <template x-for="(group, label) in groupedByDate()" :key="label">
                      <div>
                        <div class="group-header" x-text="label"></div>
                        <div class="sessions-list">
                          <template x-for="s in group" :key="s.sessionId">
                            <div>
                              <div class="session-row" @click="openSession(s)">
                                <div class="session-body">
                                  <div class="session-prompt" x-html="highlightText(s.firstPrompt || '(no prompt)', filterText)"></div>
                                  <div class="session-lower">
                                    <template x-if="s.gitBranch">
                                      <div class="session-branch">
                                        <div class="branch-square" :style="'background:' + branchColor(s.gitBranch)"></div>
                                        <span x-text="s.gitBranch"></span>
                                      </div>
                                    </template>
                                    <span class="session-msgs" x-text="s.messageCount + ' msgs'"></span>
                                    <span class="session-msgs" x-text="formatDate(s.modified)"></span>
                                    <template x-if="sessionCosts[s.sessionId]">
                                      <span class="session-msgs" style="padding-left:8px;border-left:1px solid var(--rule);font-family:'SF Mono','Fira Code',monospace" x-text="fmtCost(sessionCosts[s.sessionId])"></span>
                                    </template>
                                    <template x-if="sessionCarbon[s.sessionId] && fmtCarbon(sessionCarbon[s.sessionId])">
                                      <span class="session-msgs" style="color:var(--green);font-family:'SF Mono','Fira Code',monospace" x-text="fmtCarbon(sessionCarbon[s.sessionId])"></span>
                                    </template>
                                  </div>
                                </div>
                                <div class="session-right" style="gap:6px">
                                  <!-- Expand summary toggle -->
                                  <button class="btn btn-outline btn-sm" style="padding:2px 7px;font-size:11px;color:var(--ink-3)"
                                    :title="expandedSessions[s.sessionId] ? 'Collapse' : 'Show summary'"
                                    @click.stop="toggleSessionSummary(s)">
                                    <span x-text="expandedSessions[s.sessionId] ? '▴' : '▾'"></span>
                                  </button>
                                  <button class="session-resume-btn" :id="'resume-' + s.sessionId" :disabled="!s.resumable" :title="!s.resumable ? 'Session file deleted — cannot resume' : 'Copy command to resume this session'" @click.stop="s.resumable && resumeSession(s.sessionId, 'resume-' + s.sessionId, s.projectPath)">Resume →</button>
                                </div>
                              </div>
                              <!-- Expanded summary -->
                              <template x-if="expandedSessions[s.sessionId]">
                                <div style="background:var(--bg-2);border-bottom:1px solid var(--rule);padding:10px 14px 12px;font-size:12px">
                                  <template x-if="!sessionSummaries[s.sessionId]">
                                    <div style="color:var(--ink-3);display:flex;align-items:center;gap:6px"><div class="spinner" style="width:10px;height:10px"></div> Loading…</div>
                                  </template>
                                  <template x-if="sessionSummaries[s.sessionId]">
                                    <div style="display:flex;flex-direction:column;gap:8px">
                                      <!-- Files touched -->
                                      <template x-if="sessionSummaries[s.sessionId].filesTouched.length > 0">
                                        <div>
                                          <div style="font-size:10.5px;color:var(--ink-3);margin-bottom:4px">Files touched</div>
                                          <div style="display:flex;flex-direction:column;gap:2px">
                                            <template x-for="f in sessionSummaries[s.sessionId].filesTouched.slice(0, 8)" :key="f.tool+f.path">
                                              <div style="display:flex;align-items:center;gap:6px">
                                                <span style="font-size:10px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0"
                                                  :style="f.tool==='Write' ? 'background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)' : f.tool==='Edit' ? 'background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)' : 'background:var(--bg-2);color:var(--ink-3)'"
                                                  x-text="f.tool"></span>
                                                <code style="font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline dotted"
                                                     @click.stop="goToFileSearch(f.path)" x-text="f.path" title="Find sessions that touched this file"></code>
                                              </div>
                                            </template>
                                            <template x-if="sessionSummaries[s.sessionId].filesTouched.length > 8">
                                              <span style="font-size:11px;color:var(--ink-3)" x-text="'+ ' + (sessionSummaries[s.sessionId].filesTouched.length - 8) + ' more'"></span>
                                            </template>
                                          </div>
                                        </div>
                                      </template>
                                      <!-- Duration + cost -->
                                      <div style="font-size:11px;color:var(--ink-3);display:flex;gap:10px;flex-wrap:wrap">
                                        <template x-if="sessionSummaries[s.sessionId].durationSecs > 0">
                                          <span>Duration: <span style="color:var(--ink-2)" x-text="fmtDuration(sessionSummaries[s.sessionId].durationSecs)"></span>
                                            <template x-if="sessionSummaries[s.sessionId].turnCount > 0">
                                              <span> · <span x-text="sessionSummaries[s.sessionId].turnCount"></span> turns</span>
                                            </template>
                                          </span>
                                        </template>
                                        <template x-if="sessionCosts[s.sessionId]">
                                          <span>Cost: <span style="color:var(--ink-2);font-family:monospace" x-text="fmtCost(sessionCosts[s.sessionId])"></span></span>
                                        </template>
                                      </div>
                                    </div>
                                  </template>
                                </div>
                              </template>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Right: in-conversation results (only when searching) -->
              <template x-if="filterText.length > 1">
                <div style="flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;padding:8px 24px">
                  <template x-if="searchLoading">
                    <div style="padding:12px 20px;font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:8px"><div class="spinner" style="width:12px;height:12px"></div> Searching conversations…</div>
                  </template>
                  <template x-if="!searchLoading && searchResults.length === 0">
                    <div class="empty" style="color:var(--ink-3);font-size:12px">No matches inside conversations</div>
                  </template>
                  <template x-if="!searchLoading && searchResults.length > 0">
                    <div>
                      <div class="group-header" style="display:flex;align-items:center;gap:6px">
                        In conversations
                        <span style="font-size:10px;color:var(--ink-3);font-weight:400;text-transform:none;letter-spacing:0" x-text="searchResults.length + ' sessions'"></span>
                      </div>
                      <template x-for="r in searchResults" :key="r.sessionId">
                        <div class="search-result" @click="openSessionById(r.sessionId, r.projectDir)">
                          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                            <span style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--blue);border:1px solid rgba(26,70,192,0.3);padding:1px 6px" x-text="r.gitBranch || 'unknown'"></span>
                            <span style="font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1" x-html="highlightText((r.firstPrompt || '').slice(0,90), filterText)"></span>
                            <span style="font-size:11px;color:var(--ink-3);flex-shrink:0" x-text="formatDate(r.modified)"></span>
                          </div>
                          <template x-for="(m, mi) in r.matches" :key="mi">
                            <div class="search-snippet" x-html="highlightMatch(m)"></div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>

            </div>
          </template>

          <!-- TAB: Files -->
          <template x-if="sessionsTab === 'files'">
            <div style="flex:1;overflow-y:auto;min-height:0;padding:0 24px">
              <!-- Empty state: show recent files -->
              <template x-if="!filesLoading && filesQuery.length === 0">
                <div>
                  <template x-if="recentFiles.length === 0 && !recentFilesLoading">
                    <div class="empty" style="padding-top:40px">
                      <div class="empty-mark"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6"/><polyline points="9 2 9 6 13 6"/></svg></div>
                      <div>Search any file Claude has touched</div>
                    </div>
                  </template>
                  <template x-if="recentFilesLoading">
                    <div class="loading"><div class="spinner"></div> Loading recent files…</div>
                  </template>
                  <template x-if="recentFiles.length > 0">
                    <div style="padding:16px 0">
                      <div style="font-size:11px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">Recently touched</div>
                      <div style="display:flex;flex-wrap:wrap;gap:6px">
                        <template x-for="f in recentFiles" :key="f.filePath">
                          <button @click="filesQuery = f.filePath.split('/').pop(); searchFiles()"
                            style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--rule);background:var(--bg-2);cursor:pointer;font-size:11.5px;color:var(--ink-2);max-width:280px"
                            :title="f.filePath">
                            <span style="font-size:10px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0"
                              :style="f.tool==='Write' ? 'background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)' : f.tool==='Edit' ? 'background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)' : 'background:var(--bg-2);color:var(--ink-3)'"
                              x-text="f.tool"></span>
                            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="f.filePath.split('/').pop()"></span>
                            <span style="color:var(--ink-3);flex-shrink:0" x-text="'×' + f.sessionCount"></span>
                          </button>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
              <!-- Loading -->
              <template x-if="filesLoading">
                <div class="loading"><div class="spinner"></div> Scanning sessions…</div>
              </template>
              <!-- No results -->
              <template x-if="!filesLoading && filesQuery.length > 0 && filesResults.length === 0">
                <div class="empty"><div>No sessions touched a file matching "<span x-text="filesQuery"></span>"</div></div>
              </template>
              <!-- Results grouped by file path -->
              <template x-if="!filesLoading && filesResults.length > 0">
                <div>
                  <template x-for="(group, filePath) in filesGrouped()" :key="filePath">
                    <div style="margin-bottom:20px">
                      <!-- File header -->
